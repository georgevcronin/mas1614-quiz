<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F172A">
<title>MAS1614 Real Analysis</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0F172A;color:#F1F5F9;height:100%;overflow:hidden;display:flex;flex-direction:column;max-width:520px;margin:0 auto}
button{font-family:inherit;-webkit-appearance:none;appearance:none}
.scr{display:none;flex-direction:column;height:100%;overflow:hidden}
.scr.on{display:flex}
#s-home{align-items:center;justify-content:center;padding:2rem 1.5rem;background:radial-gradient(ellipse at 50% 10%,#1E3A5F 0%,#0F172A 60%);gap:0;text-align:center;overflow-y:auto}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.home-icon{font-size:72px;margin-bottom:1.25rem;animation:float 3s ease-in-out infinite;display:block}
.home-title{font-family:Georgia,'Times New Roman',serif;font-size:28px;font-weight:700;line-height:1.2;margin-bottom:.3rem}
.home-sub{font-size:13px;color:#94A3B8;margin-bottom:1.75rem;letter-spacing:.04em}
.stat-row{display:flex;gap:10px;margin-bottom:1.5rem;width:100%;max-width:340px}
.stat-box{flex:1;background:#1E293B;border:1px solid #334155;border-radius:12px;padding:.85rem .5rem;text-align:center}
.stat-v{font-size:22px;font-weight:700;color:#6B9FE4;display:block}
.stat-l{font-size:10px;color:#64748B;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.mode-row{display:flex;gap:8px;width:100%;max-width:340px;margin-bottom:1.1rem}
.mode-pill{flex:1;padding:.6rem .4rem;border-radius:99px;border:1.5px solid #475569;background:#1E293B;color:#94A3B8;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.mode-pill.on{border-color:#6B9FE4;background:rgba(107,159,228,.15);color:#BAD4F8}
.diff-row{display:flex;gap:8px;width:100%;max-width:340px;margin-bottom:1.1rem}
.diff-pill{flex:1;padding:.55rem .4rem;border-radius:99px;border:1.5px solid #475569;background:#1E293B;color:#94A3B8;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.diff-pill.on{border-color:#A78BFA;background:rgba(167,139,250,.15);color:#C4B5FD}
.start-btn{width:100%;max-width:340px;padding:1rem;border-radius:99px;border:none;background:linear-gradient(135deg,#6B9FE4,#3B82F6);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(107,159,228,.3);transition:transform .1s}
.start-btn:active{transform:scale(.97)}
.home-note{font-size:12px;color:#475569;margin-top:.85rem}
.diff-badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;margin-left:4px;vertical-align:middle;background:rgba(239,68,68,.2);color:#FCA5A5}
#s-quiz{padding-top:max(env(safe-area-inset-top,0px),12px)}
.hard-banner{background:rgba(239,68,68,.12);border-bottom:1px solid rgba(239,68,68,.3);text-align:center;font-size:10px;font-weight:700;letter-spacing:.1em;color:#FCA5A5;padding:4px;flex-shrink:0;display:none;text-transform:uppercase}
.hard-banner.on{display:block}
.q-hdr{display:flex;align-items:center;gap:10px;padding:.75rem 1rem .6rem;flex-shrink:0}
.back-btn{background:none;border:none;color:#64748B;font-size:22px;cursor:pointer;line-height:1;padding:4px;flex-shrink:0}
.prog-bg{flex:1;height:8px;background:#1E293B;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#6B9FE4,#34D399);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-fill.hard-prog{background:linear-gradient(90deg,#EF4444,#F59E0B)}
.hdr-r{display:flex;align-items:center;gap:8px}
.hearts{font-size:15px;display:flex;gap:1px}
.streak-pill{display:flex;align-items:center;gap:4px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.4);border-radius:99px;padding:3px 10px;font-size:13px;font-weight:700;color:#FCD34D}
.q-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 1rem;-webkit-overflow-scrolling:touch}
.q-body::-webkit-scrollbar{display:none}
.thm-card{background:#1E293B;border:1px solid #334155;border-radius:14px;padding:1rem 1.25rem;margin-bottom:.75rem}
.thm-card.hard-card{border-color:rgba(239,68,68,.4)}
.thm-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#64748B;margin-bottom:.4rem}
.thm-name{font-family:Georgia,serif;font-size:18px;color:#F1F5F9;margin-bottom:.55rem;line-height:1.3}
.thm-stmt{font-size:13px;color:#94A3B8;line-height:1.85}
.hint-btn{background:none;border:none;font-size:12px;font-weight:600;color:#64748B;cursor:pointer;text-decoration:underline;padding:0;margin-bottom:.65rem;display:block}
.hint-box{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:8px;padding:.55rem .85rem;font-size:13px;color:#FCD34D;margin-bottom:.75rem;line-height:1.6;display:none}
.hint-box.on{display:block}
.instr{font-size:13px;font-weight:600;color:#94A3B8;margin-bottom:.7rem}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:.75rem}
.opt{background:#1E293B;border:1.5px solid #334155;border-radius:12px;padding:.85rem .95rem;text-align:left;cursor:pointer;font-size:13px;color:#F1F5F9;line-height:1.75;display:flex;align-items:flex-start;gap:10px;width:100%;transition:border-color .12s,background .12s}
.opt:active:not([disabled]){transform:scale(.99)}
.opt[disabled]{cursor:default}
.opt.sel{border-color:rgba(96,165,250,.5);background:rgba(96,165,250,.12)}
.opt.wrong{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.12)}
.opt.dim{opacity:.28}
.opt.c0{border-color:rgba(107,159,228,.5);background:rgba(107,159,228,.15)}
.opt.c1{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.13)}
.opt.c2{border-color:rgba(52,211,153,.5);background:rgba(52,211,153,.13)}
.badge{flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1.5px solid #475569;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#64748B;font-family:monospace;margin-top:2px;transition:background .12s,border-color .12s,color .12s}
.opt.sel .badge{background:#60A5FA;border-color:#60A5FA;color:#fff}
.opt.wrong .badge{background:#EF4444;border-color:#EF4444;color:#fff}
.opt.c0 .badge{background:#6B9FE4;border-color:#6B9FE4;color:#fff}
.opt.c1 .badge{background:#F59E0B;border-color:#F59E0B;color:#fff}
.opt.c2 .badge{background:#34D399;border-color:#34D399;color:#fff}
.opt-body{flex:1}
.why-txt{display:none;font-size:12px;margin-top:.45rem;padding-top:.45rem;border-top:1px solid;line-height:1.6;font-style:italic}
.opt.c0 .why-txt{display:block;color:#BAD4F8;border-color:rgba(107,159,228,.3)}
.opt.c1 .why-txt{display:block;color:#FCD34D;border-color:rgba(245,158,11,.3)}
.opt.c2 .why-txt{display:block;color:#6EE7B7;border-color:rgba(52,211,153,.3)}
.why-txt a.wlink,.exp-why a.wlink,.fb-body a.wlink{color:inherit;border-bottom:1px dotted currentColor;cursor:pointer;text-decoration:none;font-style:normal;opacity:.9}
.drag-handle{color:#475569;font-size:18px;cursor:grab;flex-shrink:0;margin-top:1px;user-select:none}
.order-num{flex-shrink:0;width:26px;height:26px;border-radius:7px;background:#273449;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#64748B;font-family:monospace;margin-top:2px;transition:background .2s,color .2s}
.opt.dragging{opacity:.4}
.opt.drag-over{border-color:rgba(96,165,250,.5);background:rgba(96,165,250,.12)}
.check-btn{width:100%;padding:.85rem;border-radius:99px;border:1.5px solid #475569;background:#1E293B;color:#F1F5F9;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.exp-panel{background:#1E293B;border:1px solid #334155;border-radius:14px;padding:1rem 1.1rem;margin-bottom:.75rem;display:none}
.exp-panel.on{display:block}
.exp-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#64748B;margin-bottom:.75rem}
.exp-step{display:flex;gap:10px;margin-bottom:.6rem;align-items:flex-start}
.exp-step:last-child{margin-bottom:0}
.exp-num{flex-shrink:0;width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;margin-top:1px;font-family:monospace}
.exp-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.exp-why{font-size:13px;color:#94A3B8;line-height:1.6}
.fb{border-radius:10px;padding:.8rem 1rem;margin-bottom:.75rem;border:1px solid transparent;display:none}
.fb.ok{display:block;background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.5)}
.fb.bad{display:block;background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.5)}
.fb-title{font-size:14px;font-weight:700;margin-bottom:3px}
.fb.ok .fb-title{color:#6EE7B7}
.fb.bad .fb-title{color:#FCA5A5}
.fb-body{font-size:13px;line-height:1.55;color:#94A3B8}
.go-btn{width:100%;padding:1rem;border-radius:99px;border:none;font-size:16px;font-weight:700;cursor:pointer;display:none;transition:transform .1s;margin-top:4px;margin-bottom:max(env(safe-area-inset-bottom,0px),20px)}
.go-btn:active{transform:scale(.97)}
.go-btn.ok{display:block;background:linear-gradient(135deg,#10B981,#059669);color:#fff;box-shadow:0 6px 20px rgba(16,185,129,.3)}
.go-btn.bad{display:block;background:linear-gradient(135deg,#EF4444,#DC2626);color:#fff;box-shadow:0 6px 20px rgba(239,68,68,.25)}
#s-result{align-items:center;justify-content:center;padding:2rem 1.5rem;padding-top:max(env(safe-area-inset-top,0px),2rem);padding-bottom:max(env(safe-area-inset-bottom,0px),2rem);background:radial-gradient(ellipse at 50% 10%,#1E3A5F 0%,#0F172A 60%);text-align:center}
.res-icon{font-size:68px;display:block;margin-bottom:1rem}
.res-title{font-family:Georgia,serif;font-size:28px;font-weight:700;margin-bottom:.4rem}
.res-sub{font-size:14px;color:#94A3B8;margin-bottom:1.75rem;line-height:1.65;max-width:280px}
.res-stats{display:flex;gap:10px;margin-bottom:1.75rem;width:100%;max-width:320px}
.res-stat{flex:1;background:#1E293B;border:1px solid #334155;border-radius:12px;padding:.85rem .5rem;text-align:center}
.res-stat-v{font-size:26px;font-weight:700;display:block;color:#6B9FE4}
.res-stat-l{font-size:10px;color:#64748B;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.res-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.res-btn-p{padding:1rem;border-radius:99px;border:none;background:linear-gradient(135deg,#6B9FE4,#3B82F6);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(107,159,228,.3);transition:transform .1s}
.res-btn-p:active{transform:scale(.97)}
.res-btn-s{padding:1rem;border-radius:99px;border:1.5px solid #334155;background:#1E293B;color:#94A3B8;font-size:15px;font-weight:600;cursor:pointer;transition:transform .1s}
.res-btn-s:active{transform:scale(.97)}
.diag-wrap{margin-bottom:.75rem;border-radius:10px;overflow:hidden}
.diag-toggle{background:none;border:none;font-size:12px;font-weight:600;color:#64748B;cursor:pointer;text-decoration:underline;padding:0;margin-bottom:.5rem;display:block;font-family:inherit}
.diag-box{display:none}
.diag-box.on{display:block}
#s-wiki{padding-top:max(env(safe-area-inset-top,0px),0px)}
.wiki-hdr{display:flex;align-items:center;gap:10px;padding:1rem 1rem .75rem;flex-shrink:0;background:#0F172A;position:sticky;top:0;z-index:10}
.wiki-title{font-family:Georgia,serif;font-size:18px;font-weight:700;color:#F1F5F9;flex:1}
.wiki-search{flex:1;background:#1E293B;border:1px solid #334155;border-radius:8px;padding:.5rem .85rem;color:#F1F5F9;font-size:14px;font-family:inherit;outline:none}
.wiki-search::placeholder{color:#475569}
.wiki-search:focus{border-color:#6B9FE4}
.wiki-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 1rem 2rem}
.wiki-body::-webkit-scrollbar{display:none}
.cat-section{margin-bottom:1.25rem}
.cat-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#64748B;margin-bottom:.5rem;padding-top:.5rem}
.wiki-card{background:#1E293B;border:1px solid #334155;border-radius:12px;padding:.75rem 1rem;margin-bottom:6px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .12s,background .12s}
.wiki-card:hover{border-color:#475569;background:#273449}
.wiki-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.wiki-card-info{flex:1;min-width:0}
.wiki-card-title{font-size:14px;font-weight:600;color:#F1F5F9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wiki-card-sym{font-size:11px;color:#64748B;font-family:Georgia,serif;margin-top:1px}
.wiki-card-arrow{color:#475569;font-size:14px}
#s-wiki-detail{padding-top:max(env(safe-area-inset-top,0px),0px)}
.wd-hdr{display:flex;align-items:center;gap:10px;padding:1rem 1rem .75rem;flex-shrink:0;background:#0F172A;position:sticky;top:0;z-index:10;border-bottom:1px solid #1E293B}
.wd-back{background:none;border:none;color:#6B9FE4;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;padding:0;display:flex;align-items:center;gap:4px;flex-shrink:0}
.wd-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem 1rem 3rem}
.wd-body::-webkit-scrollbar{display:none}
.wd-cat-badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.04em;margin-bottom:.75rem}
.wd-title{font-family:Georgia,serif;font-size:22px;font-weight:700;color:#F1F5F9;margin-bottom:.2rem;line-height:1.25}
.wd-symbol{font-family:Georgia,serif;font-size:15px;color:#94A3B8;margin-bottom:1rem}
.wd-content{font-size:14px;color:#CBD5E1;line-height:1.95;margin-bottom:1.25rem}
.wd-content strong{color:#F1F5F9}
.wd-content em{color:#94A3B8;font-style:italic}
.wd-content a.wlink{color:#6B9FE4;text-decoration:none;border-bottom:1px dotted rgba(107,159,228,.5);cursor:pointer;font-style:normal}
.wd-content a.wlink:hover{border-bottom-style:solid}
.wd-section-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#475569;margin-bottom:.5rem}
.wd-links{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
.wd-link{background:#0F172A;border:1px solid #334155;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;color:#6B9FE4;cursor:pointer;transition:border-color .12s,background .12s;font-family:inherit}
.wd-link:hover{border-color:#6B9FE4;background:#1E293B}
.wd-link.green{color:#34D399;border-color:#1E3B2F}
.wd-divider{height:1px;background:#1E293B;margin:1rem 0}
/* Firebase sync UI */
.sync-row{display:flex;align-items:center;gap:8px;width:100%;max-width:340px;margin-top:.6rem}
.sync-status{flex:1;font-size:11px;color:#475569;text-align:left}
.sync-status.ok{color:#34D399}
.sync-status.err{color:#EF4444}
.sync-status.loading{color:#6B9FE4}
.sync-btn{background:none;border:1px solid #334155;border-radius:8px;padding:5px 12px;font-size:11px;font-weight:600;color:#94A3B8;cursor:pointer;white-space:nowrap;transition:border-color .12s,color .12s}
.sync-btn:hover{border-color:#6B9FE4;color:#6B9FE4}
.sync-btn.google{border-color:#4285F4;color:#4285F4}
.sync-btn.google:hover{background:rgba(66,133,244,.1)}
</style>
</head>
<body>

<div id="s-home" class="scr on">
  <span class="home-icon">вҲҖ</span>
  <div class="home-title">Real Analysis<br>Theorem Quiz</div>
  <div class="home-sub">MAS1614 В· Specimen paper trainer</div>
  <div class="stat-row">
    <div class="stat-box"><span class="stat-v" id="hs-p">0</span><span class="stat-l">played</span></div>
    <div class="stat-box"><span class="stat-v" id="hs-b">вҖ”</span><span class="stat-l">best streak</span></div>
    <div class="stat-box"><span class="stat-v" id="hs-a">вҖ”</span><span class="stat-l">accuracy</span></div>
  </div>
  <div class="mode-row">
    <button class="mode-pill on" id="pill-mc" onclick="selMode('mc')">рҹҺҜ Multi-choice</button>
    <button class="mode-pill" id="pill-ord" onclick="selMode('order')">рҹ”ў Order steps</button>
  </div>
  <div class="diff-row">
    <button class="diff-pill on" id="pill-norm" onclick="selDiff('normal')">рҹ“ҳ Normal</button>
    <button class="diff-pill" id="pill-hard" onclick="selDiff('hard')">рҹ”Ҙ Hard <span class="diff-badge">NEW</span></button>
  </div>
  <button class="start-btn" onclick="startQuiz()">Start Quiz вҶ’</button>
  <div class="home-note" id="home-note">10 questions В· 32 theorems &amp; results available</div>
  <button class="start-btn" style="margin-top:.85rem;background:linear-gradient(135deg,#4F7DBF,#3B5FA0);box-shadow:0 8px 24px rgba(79,125,191,.3)" onclick="openWiki('s-home')">рҹ“– Open Wiki</button>
  <div class="sync-row">
    <span class="sync-status" id="sync-status">вҳҒ ConnectingвҖҰ</span>
    <button class="sync-btn google" id="sync-google-btn" onclick="signInGoogle()" style="display:none">Sign in with Google</button>
    <button class="sync-btn" id="sync-reset-btn" onclick="confirmReset()" style="display:none">Reset stats</button>
  </div>
</div>

<div id="s-quiz" class="scr">
  <div class="hard-banner" id="hard-banner">вҡ  Hard Mode вҖ” Distractors designed to deceive</div>
  <div class="q-hdr">
    <button class="back-btn" onclick="goHome()">вҶҗ</button>
    <div class="prog-bg"><div class="prog-fill" id="prog" style="width:0%"></div></div>
    <div class="hdr-r">
      <div class="hearts" id="hts"></div>
      <div class="streak-pill">рҹ”Ҙ<span id="stk">0</span></div>
    </div>
  </div>
  <div class="q-body" id="q-body">
    <div class="thm-card" id="thm-card">
      <div class="thm-lbl" id="thm-lbl">Prove this theorem</div>
      <div class="thm-name" id="tname"></div>
      <div class="thm-stmt" id="tstmt"></div>
    </div>
    <div id="diag-wrap" class="diag-wrap" style="display:none">
      <button class="diag-toggle" id="diag-toggle" onclick="toggleDiag()">рҹ“Ҡ Show diagram</button>
      <div class="diag-box" id="diag-box"></div>
    </div>
    <button class="hint-btn" id="hint-btn" onclick="toggleHint()">рҹ’Ў Show hint</button>
    <div class="hint-box" id="hint-box"></div>
    <div class="instr" id="instr"></div>
    <div class="opts" id="opts"></div>
    <div class="exp-panel" id="exp-panel">
      <div class="exp-title" id="exp-title">Why this order?</div>
      <div id="exp-steps"></div>
    </div>
    <div class="fb" id="fb"><div class="fb-title" id="fbt"></div><div class="fb-body" id="fbb"></div></div>
    <button class="go-btn" id="go-btn" onclick="advance()"></button>
    <div style="height:8px"></div>
  </div>
</div>

<div id="s-result" class="scr">
  <span class="res-icon" id="r-icon"></span>
  <div class="res-title" id="r-title"></div>
  <div class="res-sub" id="r-sub"></div>
  <div class="res-stats">
    <div class="res-stat"><span class="res-stat-v" id="r-sc"></span><span class="res-stat-l">correct</span></div>
    <div class="res-stat"><span class="res-stat-v" id="r-ss"></span><span class="res-stat-l">streak</span></div>
    <div class="res-stat"><span class="res-stat-v" id="r-sa"></span><span class="res-stat-l">accuracy</span></div>
  </div>
  <div class="res-btns">
    <button class="res-btn-p" onclick="startQuiz()">Play again</button>
    <button class="res-btn-s" onclick="goHome()">Home</button>
  </div>
</div>

<div id="s-wiki" class="scr">
  <div class="wiki-hdr">
    <button class="back-btn" onclick="goHome()">вҶҗ</button>
    <div class="wiki-title">рҹ“– Wiki</div>
    <input class="wiki-search" id="wiki-search" placeholder="Search termsвҖҰ" oninput="filterWiki(this.value)">
  </div>
  <div class="wiki-body" id="wiki-body"></div>

let db,auth,fbUser=null;
let syncEnabled=false;

function setSyncStatus(msg,cls=''){
  const el=document.getElementById('sync-status');
  if(!el)return;
  el.textContent=msg;el.className='sync-status'+(cls?' '+cls:'');
}

async function initFirebase(){
  try{
    const app=initializeApp(firebaseConfig);
    auth=getAuth(app);
    db=getFirestore(app);

    onAuthStateChanged(auth,async user=>{
      fbUser=user;
      if(!user){
        // Not signed in yet вҖ” sign in anonymously
        await signInAnonymously(auth);
        return;
      }
      const isGoogle=user.providerData.some(p=>p.providerId==='google.com');
      const googleBtn=document.getElementById('sync-google-btn');
      const resetBtn=document.getElementById('sync-reset-btn');
      if(googleBtn)googleBtn.style.display=isGoogle?'none':'block';
      if(resetBtn)resetBtn.style.display='block';

      setSyncStatus(isGoogle?`вҳҒ Synced (${user.email})`:'вҳҒ Synced (anonymous)','ok');
      syncEnabled=true;

      // Pull cloud stats and merge with local (take the highest values)
      await pullStats();
    });
  }catch(e){
    console.warn('Firebase init failed:',e);
    setSyncStatus('вҳҒ Offline вҖ” stats saved locally','err');
  }
}

async function pullStats(){
  if(!fbUser||!db)return;
  try{
    const ref=doc(db,'users',fbUser.uid);
    const snap=await getDoc(ref);
    if(snap.exists()){
      const d=snap.data();
      // Merge: take the max of cloud and local for each stat
      const lp=+localStorage.getItem('mas_p')||0;
      const lb=+localStorage.getItem('mas_b')||0;
      const lc=+localStorage.getItem('mas_c')||0;
      const lt=+localStorage.getItem('mas_t')||0;
      const mp=Math.max(lp,d.p||0);
      const mb=Math.max(lb,d.b||0);
      const mc=Math.max(lc,d.c||0);
      const mt=Math.max(lt,d.t||0);
      localStorage.setItem('mas_p',mp);
      localStorage.setItem('mas_b',mb);
      localStorage.setItem('mas_c',mc);
      localStorage.setItem('mas_t',mt);
      // If cloud was ahead, push the merged values back
      if(mp!==lp||mb!==lb||mc!==lc||mt!==lt){
        await pushStats(mp,mb,mc,mt);
      }
    }
    // Refresh the home screen display
    if(typeof loadStats==='function')loadStats();
  }catch(e){console.warn('Pull failed:',e);}
}

async function pushStats(p,b,c,t){
  if(!fbUser||!db||!syncEnabled)return;
  try{
    await setDoc(doc(db,'users',fbUser.uid),{p,b,c,t,updated:serverTimestamp()},{merge:true});
  }catch(e){console.warn('Push failed:',e);}
}

// Called after every quiz round from saveStats()
window.firebasePush=async function(){
  if(!syncEnabled)return;
  const p=+localStorage.getItem('mas_p')||0;
  const b=+localStorage.getItem('mas_b')||0;
  const c=+localStorage.getItem('mas_c')||0;
  const t=+localStorage.getItem('mas_t')||0;
  await pushStats(p,b,c,t);
  setSyncStatus('вҳҒ Synced just now','ok');
};

window.signInGoogle=async function(){
  if(!auth)return;
  try{
    setSyncStatus('вҳҒ Opening Google sign-inвҖҰ','loading');
    const provider=new GoogleAuthProvider();
    await linkWithPopup(auth,provider);
    // onAuthStateChanged will fire and update UI
  }catch(e){
    if(e.code==='auth/credential-already-in-use'){
      setSyncStatus('вҳҒ That Google account already has stats вҖ” refresh to merge.','err');
    }else{
      setSyncStatus('вҳҒ Sign-in failed. Try again.','err');
    }
  }
};

window.confirmReset=function(){
  if(confirm('Reset all stats? This cannot be undone.')){
    localStorage.setItem('mas_p',0);localStorage.setItem('mas_b',0);
    localStorage.setItem('mas_c',0);localStorage.setItem('mas_t',0);
    if(typeof loadStats==='function')loadStats();
    if(typeof window.firebasePush==='function')window.firebasePush();
  }
};

initFirebase();

// в”Җв”Җ SPECIMEN PAPER 2: SUPREMUM в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
{name:"sup(AвҲӘB) = max{sup A, sup B}",
 hint:"Show M=max{sup A, sup B} is an upper bound for AвҲӘB, then show nothing smaller is.",
 stmt:"If A, B вҠҶ в„қ are non-empty and bounded above, then sup(AвҲӘB)=max{sup A, sup B}.",
 ok:["Let M=max{sup A, sup B}. For any xвҲҲAвҲӘB, either xвҲҲA so xвүӨsup AвүӨM, or xвҲҲB so xвүӨsup BвүӨM; thus M is an upper bound for AвҲӘB.",
     "Suppose U < M is another upper bound for AвҲӘB. WLOG M=sup A; then U < sup A, contradicting the definition of sup A as the least upper bound (since U bounds A from above).",
     "Therefore M is the least upper bound of AвҲӘB, i.e. sup(AвҲӘB)=max{sup A, sup B}."],
 why:["M=max{sup A, sup B} is an upper bound for AвҲӘB because every element of AвҲӘB belongs to at least one of A or B, and is bounded by the corresponding sup, which is вүӨM.",
      "The characterisation of supremum says no number strictly below sup A can bound A from above. Since U<M=sup A and AвҠҶAвҲӘB, U cannot bound AвҲӘB.",
      "Having shown M is an upper bound and no smaller number is, M is the least upper bound вҖ” the supremum."],

      "Take any xвҲҲAвҲӘB; xвүӨmax{sup A, sup B}; since this bound is achieved (WLOG by some element near sup A), it is the supremum.",
      "Apply the [[completeness|Axiom of Completeness]] separately to A and B, then take the max of the two suprema."],
 hardBad:["M bounds AвҲӘB from above; to show it is least, note that for any Оө>0 there exist aвҲҲA with a>sup AвҲ’Оө and bвҲҲB with b>sup BвҲ’Оө; the larger of a,b is in AвҲӘB and within Оө of M.",
           "M is an upper bound; to show it is least, note sup A and sup B are both elements of AвҲӘB so M=max{sup A, sup B} is attained; hence it is the supremum.",
           "For any Оө>0, WLOG M=sup A; then вҲғaвҲҲA with a>MвҲ’Оө; since aвҲҲAвҲӘB, any upper bound of AвҲӘB is вүҘMвҲ’Оө; letting ОөвҶ’0 gives sup(AвҲӘB)вүҘM, combined with sup(AвҲӘB)вүӨM gives equality."]},

// в”Җв”Җ SPECIMEN PAPER 2: MVT APPLICATIONS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
{name:"MVT application: bounding f(0) given fвҖІвүӨ2",

     "Since fвҖІ(c)вүӨ2, we have [f(0)+3]/7 вүӨ 2, i.e. f(0)+3 вүӨ 14, i.e. f(0) вүӨ 11.",

      "Checking f(x)=2x+11: f(вҲ’7)=вҲ’14+11=вҲ’3 вң“, fвҖІ(x)=2 вң“, f(0)=11 вң“. So 11 is attained."],

      "By [[rolle|Rolle's Theorem]], вҲғc with fвҖІ(c)=0; since fвҖІ(c)вүӨ2, f(0)вүӨf(вҲ’7)+2В·(0вҲ’(вҲ’7))=11.",
      "The [[ivt|IVT]] applied to fвҖІ on [вҲ’7,0] gives a point where fвҖІ=2; integrating gives f(0)=11."],

{name:"At most one fixed point if fвҖІвү 1",
 hint:"Suppose two fixed points exist; apply MVT to the difference h(x)=f(x)вҲ’x on the interval between them.",
 stmt:"If f is differentiable on an interval with fвҖІ(x)вү 1 for all x, then f has at most one fixed point.",

     "Define h(x)=f(x)вҲ’x. By the [[mvt|MVT]] applied to h on [p,q]: вҲғcвҲҲ(p,q) with hвҖІ(c)=[h(q)вҲ’h(p)]/(qвҲ’p)=(qвҲ’pвҲ’p+p)/(qвҲ’p)=0.",
     "But hвҖІ(c)=fвҖІ(c)вҲ’1=0 means fвҖІ(c)=1, contradicting fвҖІ(x)вү 1 for all x. So f has at most one fixed point."],
 why:["We define h(x)=f(x)вҲ’x so that fixed points become zeros of h: h(p)=f(p)вҲ’p=0, h(q)=0.",
      "The [[mvt|MVT]] applied to h gives hвҖІ(c)=[h(q)вҲ’h(p)]/(qвҲ’p)=0/(qвҲ’p)=0.",
      "hвҖІ(c)=0 вҹ№ fвҖІ(c)=1, which is exactly what we assumed cannot happen. Contradiction."],
 bad:["Since fвҖІ(x)вү 1, f is strictly monotone, hence injective, hence has at most one fixed point.",
      "Apply [[rolle|Rolle's Theorem]] to h(x)=f(x)вҲ’x: h(p)=h(q)=0 gives hвҖІ(c)=0 i.e. fвҖІ(c)=1, contradiction. (Same as correct answer вҖ” close variant)",
      "Fixed points satisfy f(x)=x; differentiating both sides gives fвҖІ(x)=1, contradicting the hypothesis."],
 hardBad:["If f(p)=p and f(q)=q, then by [[ivt|IVT]] applied to f(x)вҲ’x, there is some c between p and q with f(c)=c; but we need fвҖІ(c)=1, which is impossible вҖ” hence at most one fixed point.",
           "Since fвҖІ(x)вү 1, f(x)вҲ’x is strictly monotone; a strictly monotone function can vanish at most once; so f has at most one fixed point. (Avoids using MVT explicitly)",

// в”Җв”Җ SPECIMEN PAPER 1 SECTION B в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
{name:"True/false: convergent sequences and their value sets",

     "(A) is false: the sequence aвӮҷ=1/n converges to 0, and the set {1/n : nвҲҲв„•}={1,1/2,1/3,вҖҰ} has no maximum (every element is exceeded by the first term aвӮҒ=1, but no element is the actual supremum attained since supis 1=aвӮҒ... wait вҖ” actually aвӮҒ=1 is the maximum. Better: aвӮҷ=1/(n+1) shifted has aвӮҒ=1/2 and values strictly increasing toward... reconsider. Use aвӮҷ=вҲ’1/n: converges to 0, values {вҲ’1,вҲ’1/2,вҲ’1/3,вҖҰ} have no minimum (inf=вҲ’1=aвӮҒ, which IS attained). Standard example: aвӮҷ=(вҲ’1)вҒҝ/n converges to 0; {1,вҲ’1/2,1/3,вҲ’1/4,вҖҰ} вҖ” the supremum is 1=aвӮҒ which IS attained. The standard counterexample for (A) failing: no, actually convergent sequences can fail to have a maximum if the terms increase to the limit. Use aвӮҷ=1вҲ’1/n: converges to 1, values {0,1/2,2/3,3/4,вҖҰ} вҖ” sup=1 is NOT attained, so no maximum."],

{name:"Squeezed monotone sequences: xвӮҷвүӨyвӮҷ, xвӮҷ increasing, yвӮҷ decreasing",

     "(A) is FALSE: take xвӮҷ=0 for all n and yвӮҷ=1/n. Then xвӮҷвүӨyвӮҷ, xвӮҷ increasing (constant), yвӮҷ decreasing, and lim xвӮҷ=0вү 1=... wait lim yвӮҷ=0=lim xвӮҷ. Try xвӮҷ=вҲ’1/n, yвӮҷ=1/n: xвӮҷвүӨyвӮҷ вң“, xвӮҷ increasing вң“, yвӮҷ decreasing вң“, lim xвӮҷ=0=lim yвӮҷ вҖ” this gives (A)! Better example: xвӮҷ=0, yвӮҷ=1. Both constant (increasing/decreasing trivially), xвӮҷвүӨyвӮҷ, lim xвӮҷ=0<1=lim yвӮҷ. So (A) fails."],

{name:"Which series converge? (SP2 Section B)",

{name:"Differentiable functions: true/false (SP2 B9)",

{name:"Order Limit Theorem",
 hint:"Contradiction: assume a<0, take Оө=|a|, find N, deduce a_N<0.",
 stmt:"If aвӮҷвҶ’a and aвӮҷвүҘ0 for all n, then aвүҘ0.",
 ok:["Suppose for contradiction that a<0.",
     "Take Оө=|a| in the [[epsilon_n|ОөвҖ“N definition]] of convergence to find N with |a_NвҲ’a|<|a|.",
     "Then a_N < a+|a|=0, contradicting aвӮҷвүҘ0 for all n."],
 why:["We use proof by contradiction: a negative limit would force eventual terms to be negative.",
      "Оө=|a| is chosen so the Оө-neighbourhood of a lies entirely in (вҲ’вҲһ,0). The N-condition puts a_N in that neighbourhood.",
      "a_N<0 directly contradicts the hypothesis aвӮҷвүҘ0. So aвүҘ0."],

           "Suppose a<0; then since aвӮҷвҶ’a there exists N with aвӮҷ<0 for all n>N, contradicting aвӮҷвүҘ0.",

{name:"Convergence of 1/вҲҡn вҶ’ 0",
 hint:"Rearrange 1/вҲҡn < Оө to get n > 1/ОөВІ; apply Archimedean Axiom.",
 stmt:"Prove that (1/вҲҡn)вӮҷ converges to 0.",
 ok:["Let Оө>0. By the [[naturals|Archimedean Axiom]], choose NвҲҲв„• with N > 1/ОөВІ.",
     "For all nвүҘN: nвүҘN > 1/ОөВІ, so ОөВІ > 1/n, so Оө > 1/вҲҡn.",
     "Thus |1/вҲҡn вҲ’ 0| = 1/вҲҡn < Оө for all nвүҘN, confirming [[convergence|convergence]] to 0 by the [[epsilon_n|ОөвҖ“N definition]]."],
 why:["The [[epsilon_n|ОөвҖ“N argument]] requires N depending on Оө. Rearranging 1/вҲҡn < Оө gives n > 1/ОөВІ, so we need N > 1/ОөВІ.",
      "Once N > 1/ОөВІ, every nвүҘN satisfies n > 1/ОөВІ, and taking reciprocals (reversing inequality) gives 1/вҲҡn < Оө.",
      "Since 1/вҲҡn > 0, |1/вҲҡnвҲ’0|=1/вҲҡn. This completes the [[epsilon_n|ОөвҖ“N verification]]."],

      "1/вҲҡn is decreasing and bounded below by 0, so [[mct|MCT]] gives convergence (but not necessarily to 0).",

           "By [[naturals|Archimedean Axiom]] find N>1/Оө; for nвүҘN: 1/nвүӨ1/N<Оө, so 1/вҲҡnвүӨ1/n<Оө.",
           "The sequence (1/вҲҡn) is decreasing and bounded below by 0; [[mct|MCT]] gives limit lвүҘ0; subsequence n=kВІ gives 1/kвҶ’0=l."]},

           "lim_{xвҶ’xвӮҖ}[f(x)вҲ’f(xвӮҖ)]/(xвҲ’xвӮҖ)=fвҖІ(xвӮҖ) exists; therefore lim_{xвҶ’xвӮҖ}[f(x)вҲ’f(xвӮҖ)]=fвҖІ(xвӮҖ)В·lim(xвҲ’xвӮҖ)=fвҖІ(xвӮҖ)В·0=0.",
           "The difference quotient is bounded near xвӮҖ (since it has a limit); bounded times (xвҲ’xвӮҖ)вҶ’0 gives f(x)вҲ’f(xвӮҖ)вҶ’0."]},

function wikiLink(text){
  if(!text)return '';
  return String(text).replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g,(_,id,label)=>`<a class="wlink" href="#" onclick="event.preventDefault();openEntry('${id}')">${label}</a>`);
}
// For links rendered inside the quiz (explanations, why-text) вҖ” sets return to quiz screen
function wikiLinkQuiz(text){
  if(!text)return '';
  return String(text).replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g,(_,id,label)=>`<a class="wlink" href="#" onclick="event.preventDefault();openEntryFromQuiz('${id}')">${label}</a>`);
}
function openEntryFromQuiz(id){
  wikiReturnScreen='s-quiz';
  wikiHistory=[];
  openEntry(id);
}
function stripWiki(t){return String(t).replace(/\[\[[^\]|]+\|([^\]]+)\]\]/g,'$1');}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function show(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// STATS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function loadStats(){
  try{const p=+localStorage.getItem('mas_p')||0,b=+localStorage.getItem('mas_b')||0,c=+localStorage.getItem('mas_c')||0,t=+localStorage.getItem('mas_t')||0;
  document.getElementById('hs-p').textContent=p;document.getElementById('hs-b').textContent=b||'вҖ”';document.getElementById('hs-a').textContent=t>0?Math.round(c/t*100)+'%':'вҖ”';}catch(e){}
}
function saveStats(){
  try{const p=(+localStorage.getItem('mas_p')||0)+1,b=Math.max(+localStorage.getItem('mas_b')||0,bstk),c=(+localStorage.getItem('mas_c')||0)+cor,t=(+localStorage.getItem('mas_t')||0)+tot;
  localStorage.setItem('mas_p',p);localStorage.setItem('mas_b',b);localStorage.setItem('mas_c',c);localStorage.setItem('mas_t',t);
  if(typeof window.firebasePush==='function')window.firebasePush();}catch(e){}
}

function selMode(m){mode=m;document.getElementById('pill-mc').classList.toggle('on',m==='mc');document.getElementById('pill-ord').classList.toggle('on',m==='order');}
function selDiff(d){
  diff=d;document.getElementById('pill-norm').classList.toggle('on',d==='normal');document.getElementById('pill-hard').classList.toggle('on',d==='hard');
  document.getElementById('home-note').textContent=d==='hard'?'10 questions В· Hard mode вҖ” subtle distractors':'10 questions В· 32 theorems & results available';
}

function shuf(a){let b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function renderH(){document.getElementById('hts').innerHTML=Array.from({length:3},(_,i)=>i<hts?'вқӨпёҸ':'рҹ–Ө').join('');}
function toggleDiag(){const b=document.getElementById('diag-box'),t=document.getElementById('diag-toggle');b.classList.toggle('on');t.textContent=b.classList.contains('on')?'рҹҷҲ Hide diagram':'рҹ“Ҡ Show diagram';}
function toggleHint(){const b=document.getElementById('hint-box'),t=document.getElementById('hint-btn');b.classList.toggle('on');t.textContent=b.classList.contains('on')?'рҹҷҲ Hide hint':'рҹ’Ў Show hint';}

function startQuiz(){
  qs=shuf(Q).slice(0,10);qi=0;hts=3;stk=0;bstk=0;cor=0;tot=0;done=false;sel=new Set();
  show('s-quiz');
  document.getElementById('hard-banner').classList.toggle('on',diff==='hard');
  document.getElementById('prog').className='prog-fill'+(diff==='hard'?' hard-prog':'');
  document.getElementById('thm-card').className='thm-card'+(diff==='hard'?' hard-card':'');
  renderQ();
}
function goHome(){loadStats();show('s-home');}

function renderQ(){
  done=false;sel=new Set();
  const q=qs[qi];
  document.getElementById('prog').style.width=(qi/qs.length*100)+'%';
  document.getElementById('stk').textContent=stk;renderH();
  document.getElementById('tname').textContent=q.name;
  document.getElementById('tstmt').textContent=stripWiki(q.stmt||'');
  document.getElementById('hint-box').textContent=q.hint||'';
  const diagWrap=document.getElementById('diag-wrap'),diagBox=document.getElementById('diag-box');
  const svg=DIAG[q.name]||'';
  if(svg){diagBox.innerHTML=svg;diagWrap.style.display='block';}else{diagWrap.style.display='none';}
  diagBox.classList.remove('on');
  document.getElementById('diag-toggle').textContent='рҹ“Ҡ Show diagram';
  document.getElementById('hint-box').classList.remove('on');
  document.getElementById('hint-btn').textContent='рҹ’Ў Show hint';
  document.getElementById('fb').className='fb';
  document.getElementById('exp-panel').classList.remove('on');
  document.getElementById('go-btn').className='go-btn';
  document.getElementById('q-body').scrollTop=0;
  document.getElementById('thm-lbl').textContent=diff==='hard'?'Hard mode вҖ” answer carefully':'Prove / identify';
  document.getElementById('exp-title').textContent=q.ok.length>1?'Step-by-step explanation':'Explanation';
  if(mode==='mc')renderMC(q);else renderOrder(q);
}

function renderMC(q){
  const isM=q.ok.length>1;
  document.getElementById('instr').textContent=isM?'Select all '+q.ok.length+' correct steps:':'Select the correct answer:';
  const wrongPool=(diff==='hard'&&q.hardBad&&q.hardBad.length)?q.hardBad:q.bad;
  const opts=shuf([...q.ok,...shuf(wrongPool).slice(0,isM?2:3)]);
  const lets=['A','B','C','D','E'];
  const grid=document.getElementById('opts');grid.innerHTML='';
  opts.forEach((o,i)=>{
    const okIdx=q.ok.indexOf(o);
    const btn=document.createElement('button');btn.className='opt';btn.dataset.ok=okIdx>=0;btn.dataset.idx=okIdx;
    const badge=document.createElement('span');badge.className='badge';badge.textContent=lets[i];
    const body=document.createElement('span');body.className='opt-body';
    const txt=document.createElement('span');txt.textContent=stripWiki(o);
    const why=document.createElement('span');why.className='why-txt';
    if(okIdx>=0){why.innerHTML=wikiLinkQuiz(q.why[okIdx]||'');}
    body.appendChild(txt);body.appendChild(why);
    btn.appendChild(badge);btn.appendChild(body);
    btn.onclick=()=>pickMC(btn,q,isM);
    grid.appendChild(btn);
  });
}

function pickMC(btn,q,isM){
  if(done)return;
  if(!isM){
    done=true;const ok=btn.dataset.ok==='true';
    document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;const idx=parseInt(b.dataset.idx);
      if(idx>=0)b.classList.add('c'+idx);else if(b===btn&&!ok)b.classList.add('wrong');else b.classList.add('dim');});
    resolveQ(ok,q);
  }else{
    if(sel.has(btn)){sel.delete(btn);btn.classList.remove('sel');}else{sel.add(btn);btn.classList.add('sel');}
    if(sel.size===q.ok.length){done=true;const allOk=[...sel].every(b=>b.dataset.ok==='true');
      document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;b.classList.remove('sel');const idx=parseInt(b.dataset.idx);
        if(idx>=0)b.classList.add('c'+idx);else if(sel.has(b))b.classList.add('wrong');else b.classList.add('dim');});
      resolveQ(allOk,q);}
  }
}

function renderOrder(q){
  document.getElementById('instr').textContent='Drag to arrange the proof steps in the correct order:';
  const shuffled=shuf([...q.ok]);
  const grid=document.getElementById('opts');grid.innerHTML='';
  shuffled.forEach(o=>{
    const div=document.createElement('div');div.className='opt';div.style.cursor='grab';
    div.dataset.content=o;div.dataset.ci=q.ok.indexOf(o);div.draggable=true;
    const handle=document.createElement('span');handle.className='drag-handle';handle.textContent='в ҝ';
    const num=document.createElement('span');num.className='order-num';num.textContent='?';
    const body=document.createElement('span');body.className='opt-body';
    const txt=document.createElement('span');txt.textContent=stripWiki(o);
    const why=document.createElement('span');why.className='why-txt';
    why.innerHTML=wikiLinkQuiz(q.why[q.ok.indexOf(o)]||'');
    body.appendChild(txt);body.appendChild(why);
    div.appendChild(handle);div.appendChild(num);div.appendChild(body);
    div.addEventListener('dragstart',e=>{dragSrc=div;div.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    div.addEventListener('dragend',()=>{div.classList.remove('dragging');grid.querySelectorAll('.opt').forEach(b=>b.classList.remove('drag-over'));updateNums();});
    div.addEventListener('dragover',e=>{e.preventDefault();if(div!==dragSrc)div.classList.add('drag-over');});
    div.addEventListener('dragleave',()=>div.classList.remove('drag-over'));
    div.addEventListener('drop',e=>{e.preventDefault();if(div===dragSrc)return;div.classList.remove('drag-over');
      const items=[...grid.querySelectorAll('.opt[draggable]')];const si=items.indexOf(dragSrc),ti=items.indexOf(div);
      if(si<ti)grid.insertBefore(dragSrc,div.nextSibling);else grid.insertBefore(dragSrc,div);updateNums();});
    let ty=0;
    div.addEventListener('touchstart',e=>{ty=e.touches[0].clientY;div.style.opacity='.5';},{passive:true});
    div.addEventListener('touchmove',e=>{e.preventDefault();const y=e.touches[0].clientY;
      const items=[...grid.querySelectorAll('.opt[draggable]')];
      const target=items.find(b=>{const r=b.getBoundingClientRect();return y>=r.top&&y<=r.bottom&&b!==div;});
      if(target){const si=items.indexOf(div),ti=items.indexOf(target);if(si<ti)grid.insertBefore(div,target.nextSibling);else grid.insertBefore(div,target);updateNums();}
    },{passive:false});
    div.addEventListener('touchend',()=>{div.style.opacity='1';},{passive:true});
    grid.appendChild(div);
  });
  updateNums();
  const chk=document.createElement('button');chk.className='check-btn';chk.textContent='вң“ Check my order';
  chk.onclick=()=>checkOrder(q,grid,chk);grid.appendChild(chk);
}

function updateNums(){[...document.getElementById('opts').querySelectorAll('.opt[draggable]')].forEach((b,i)=>b.querySelector('.order-num').textContent=i+1);}

function checkOrder(q,grid,btn){
  if(done)return;done=true;btn.style.display='none';
  const items=[...grid.querySelectorAll('.opt[draggable]')];
  const ok=items.every((b,i)=>b.dataset.content===q.ok[i]);
  items.forEach(b=>{b.draggable=false;b.style.cursor='default';const ci=parseInt(b.dataset.ci);b.classList.add('c'+ci);
    const num=b.querySelector('.order-num');num.textContent=ci+1;num.style.background=CC[ci];num.style.color='#fff';});
  resolveQ(ok,q);
}

function showExp(q){
  const panel=document.getElementById('exp-panel'),steps=document.getElementById('exp-steps');
  steps.innerHTML='';
  q.ok.forEach((s,i)=>{
    const d=document.createElement('div');d.className='exp-step';
    const num=document.createElement('span');num.className='exp-num';num.style.background=CC[i%3];num.textContent=i+1;
    const content=document.createElement('div');
    const lbl=document.createElement('div');lbl.className='exp-lbl';lbl.style.color=CC[i%3];lbl.textContent='Step '+(i+1);
    const why=document.createElement('div');why.className='exp-why';why.innerHTML=wikiLinkQuiz(q.why[i]||'');
    content.appendChild(lbl);content.appendChild(why);d.appendChild(num);d.appendChild(content);steps.appendChild(d);
  });
  panel.classList.add('on');
}

function resolveQ(ok,q){
  tot++;showExp(q);
  const fb=document.getElementById('fb'),gb=document.getElementById('go-btn');
  if(ok){
    cor++;stk++;if(stk>bstk)bstk=stk;
    fb.className='fb ok';
    document.getElementById('fbt').textContent=stk>=3?'рҹ”Ҙ '+stk+' in a row!':'Correct!';
    document.getElementById('fbb').innerHTML='Read the explanations above вҖ” note the wiki links to related theorems.';
    gb.textContent=qi+1<qs.length?'Continue вҶ’':'See results';gb.className='go-btn ok';
  }else{
    stk=0;hts--;
    fb.className='fb bad';
    document.getElementById('fbt').textContent=diff==='hard'?'Incorrect вҖ” hard mode is designed to test your precision.':'Incorrect.';
    document.getElementById('fbb').innerHTML='The colour-coded steps show the correct answer. Study the explanations carefully.';
    gb.textContent=hts<=0?'See results':(qi+1<qs.length?'Continue вҶ’':'See results');gb.className='go-btn bad';
  }
  document.getElementById('stk').textContent=stk;renderH();
  setTimeout(()=>document.getElementById('q-body').scrollTo({top:document.getElementById('q-body').scrollHeight,behavior:'smooth'}),150);
}

function advance(){if(hts<=0||qi+1>=qs.length){showResult();return;}qi++;renderQ();}

function showResult(){
  saveStats();show('s-result');
  const pct=tot>0?Math.round(cor/tot*100):0;
  let icon,title,sub;
  if(pct===100){icon='рҹҸҶ';title='Outstanding.';sub=diff==='hard'?'Perfect on Hard mode. Distinction-level.':'Every question correct. Excellent preparation.';}
  else if(pct>=75){icon='рҹҺ“';title='Well done.';sub='Solid performance. Review the incorrect questions.';}
  else if(pct>=50){icon='рҹ“–';title='Keep revising.';sub='More work needed before the examination.';}
  else{icon='вңҸпёҸ';title='More work needed.';sub=diff==='hard'?'Try Normal mode first, then return to Hard.':'Return to your theorem sheet and study proof structures.';}
  document.getElementById('r-icon').textContent=icon;
  document.getElementById('r-title').textContent=title;
  document.getElementById('r-sub').textContent=sub;
  document.getElementById('r-sc').textContent=cor+'/'+tot;
  document.getElementById('r-ss').textContent=bstk;
  document.getElementById('r-sa').textContent=pct+'%';
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// WIKI
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function wikiById(id){return WIKI.find(w=>w.id===id);}
function openWiki(returnScreen){
  wikiReturnScreen=returnScreen||'s-home';
  wikiHistory=[];
  document.getElementById('wiki-search').value='';
  renderWikiList(WIKI);
  // Update the back button on wiki list to return to correct screen
  document.querySelector('#s-wiki .back-btn').onclick=()=>show(wikiReturnScreen);
  show('s-wiki');
}
function filterWiki(q){const lq=q.toLowerCase();renderWikiList(WIKI.filter(w=>w.title.toLowerCase().includes(lq)||(w.symbol&&w.symbol.toLowerCase().includes(lq))||w.category.toLowerCase().includes(lq)||w.body.replace(/<[^>]+>/g,'').replace(/\[\[.*?\]\]/g,'').toLowerCase().includes(lq)));}
function renderWikiList(items){
  const cats=['Foundation','Notation','Definition','Key Lemma','Theorem','Standard Example'];
  const body=document.getElementById('wiki-body');body.innerHTML='';
  cats.forEach(cat=>{
    const group=items.filter(w=>w.category===cat);if(!group.length)return;
    const sec=document.createElement('div');sec.className='cat-section';
    const lbl=document.createElement('div');lbl.className='cat-label';lbl.textContent=cat;sec.appendChild(lbl);
    group.forEach(w=>{
      const card=document.createElement('div');card.className='wiki-card';
      card.innerHTML=`<div class="wiki-cat-dot" style="background:${CAT_COLOURS[w.category]||'#64748B'}"></div><div class="wiki-card-info"><div class="wiki-card-title">${w.title}</div>${w.symbol?`<div class="wiki-card-sym">${w.symbol}</div>`:''}</div><div class="wiki-card-arrow">вҖә</div>`;
      card.onclick=()=>{wikiHistory=[];openEntry(w.id);};sec.appendChild(card);
    });
    body.appendChild(sec);
  });
}
function openEntry(id){
  const w=wikiById(id);if(!w)return;
  if(!wikiHistory.length||wikiHistory[wikiHistory.length-1]!==id)wikiHistory.push(id);
  const col=CAT_COLOURS[w.category]||'#64748B',bg=CAT_BG[w.category]||'rgba(100,116,139,.12)';
  const backBtn=document.getElementById('wd-back-btn');
  if(wikiHistory.length>1){
    const prevId=wikiHistory[wikiHistory.length-2],prev=wikiById(prevId);
    backBtn.textContent='вҶҗ '+(prev?prev.title:'Back');
    backBtn.onclick=()=>{wikiHistory.pop();wikiHistory.pop();openEntry(prevId);};
  } else {
    // No history вҖ” back goes to wiki list (if opened from wiki) or return screen (if opened from quiz via inline link)
    if(wikiReturnScreen==='s-quiz'){
      backBtn.textContent='вҶҗ Back to question';
      backBtn.onclick=()=>{wikiHistory=[];show('s-quiz');};
    } else {
      backBtn.textContent='вҶҗ Wiki';
      backBtn.onclick=()=>show('s-wiki');
    }
  }
  const body=document.getElementById('wd-body');
  let html=`<div class="wd-cat-badge" style="background:${bg};color:${col}">${w.category}</div><div class="wd-title">${w.title}</div>${w.symbol?`<div class="wd-symbol">${w.symbol}</div>`:''}<div class="wd-divider"></div><div class="wd-content">${wikiLink(w.body)}</div>`;
  if(w.relies_on&&w.relies_on.length){html+=`<div class="wd-divider"></div><div class="wd-section-title">Relies on</div><div class="wd-links">`;w.relies_on.forEach(rid=>{const r=wikiById(rid);if(r)html+=`<button class="wd-link" onclick="openEntryFromLink('${rid}')">${r.title}</button>`;});html+=`</div>`;}
  if(w.used_by&&w.used_by.length){html+=`<div class="wd-section-title" style="margin-top:.75rem">Used by</div><div class="wd-links">`;w.used_by.forEach(uid=>{const u=wikiById(uid);if(u)html+=`<button class="wd-link green" onclick="openEntryFromLink('${uid}')">${u.title}</button>`;});html+=`</div>`;}
  body.innerHTML=html;document.getElementById('wd-body').scrollTop=0;show('s-wiki-detail');
}
function openEntryFromLink(id){if(wikiHistory[wikiHistory.length-1]!==id)wikiHistory.push(id);wikiHistory.pop();openEntry(id);}

// Init
loadStats();
</script>
