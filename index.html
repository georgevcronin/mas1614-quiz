<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F172A">
<title>MSP1613 Multivariable Calculus</title>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0F172A;color:#F1F5F9;height:100%;overflow:hidden;display:flex;flex-direction:column;max-width:520px;margin:0 auto}
button{font-family:inherit;-webkit-appearance:none;appearance:none}
.scr{display:none;flex-direction:column;height:100%;overflow:hidden}
.scr.on{display:flex}
#s-home{align-items:center;justify-content:center;padding:2rem 1.5rem;background:radial-gradient(ellipse at 50% 10%,#1E3A5F 0%,#0F172A 60%);gap:0;text-align:center;overflow-y:auto}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.home-icon{font-size:72px;margin-bottom:1.25rem;animation:float 3s ease-in-out infinite;display:block}
.home-title{font-family:Georgia,'Times New Roman',serif;font-size:28px;font-weight:700;line-height:1.2;margin-bottom:.3rem}
.home-sub{font-size:13px;color:#94A3B8;margin-bottom:1.75rem;letter-spacing:.04em}
.stat-row{display:flex;gap:10px;margin-bottom:1.5rem;width:100%;max-width:340px}
.stat-box{flex:1;background:#1E293B;border:1px solid #334155;border-radius:12px;padding:.85rem .5rem;text-align:center}
.stat-v{font-size:22px;font-weight:700;color:#6B9FE4;display:block}
.stat-l{font-size:10px;color:#64748B;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.mode-row{display:flex;gap:8px;width:100%;max-width:340px;margin-bottom:1.1rem}
.mode-pill{flex:1;padding:.6rem .4rem;border-radius:99px;border:1.5px solid #475569;background:#1E293B;color:#94A3B8;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.mode-pill.on{border-color:#6B9FE4;background:rgba(107,159,228,.15);color:#BAD4F8}
.diff-row{display:flex;gap:8px;width:100%;max-width:340px;margin-bottom:1.1rem}
.diff-pill{flex:1;padding:.55rem .4rem;border-radius:99px;border:1.5px solid #475569;background:#1E293B;color:#94A3B8;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.diff-pill.on{border-color:#A78BFA;background:rgba(167,139,250,.15);color:#C4B5FD}
.start-btn{width:100%;max-width:340px;padding:1rem;border-radius:99px;border:none;background:linear-gradient(135deg,#6B9FE4,#3B82F6);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(107,159,228,.3);transition:transform .1s}
.start-btn:active{transform:scale(.97)}
.home-note{font-size:12px;color:#475569;margin-top:.85rem}
.diff-badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;margin-left:4px;vertical-align:middle;background:rgba(239,68,68,.2);color:#FCA5A5}
#s-quiz{padding-top:max(env(safe-area-inset-top,0px),12px)}
.hard-banner{background:rgba(239,68,68,.12);border-bottom:1px solid rgba(239,68,68,.3);text-align:center;font-size:10px;font-weight:700;letter-spacing:.1em;color:#FCA5A5;padding:4px;flex-shrink:0;display:none;text-transform:uppercase}
.hard-banner.on{display:block}
.q-hdr{display:flex;align-items:center;gap:10px;padding:.75rem 1rem .6rem;flex-shrink:0}
.back-btn{background:none;border:none;color:#64748B;font-size:22px;cursor:pointer;line-height:1;padding:4px;flex-shrink:0}
.prog-bg{flex:1;height:8px;background:#1E293B;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#6B9FE4,#34D399);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-fill.hard-prog{background:linear-gradient(90deg,#EF4444,#F59E0B)}
.hdr-r{display:flex;align-items:center;gap:8px}
.hearts{font-size:15px;display:flex;gap:1px}
.streak-pill{display:flex;align-items:center;gap:4px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.4);border-radius:99px;padding:3px 10px;font-size:13px;font-weight:700;color:#FCD34D}
.q-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 1rem;-webkit-overflow-scrolling:touch}
.q-body::-webkit-scrollbar{display:none}
.thm-card{background:#1E293B;border:1px solid #334155;border-radius:14px;padding:1rem 1.25rem;margin-bottom:.75rem}
.thm-card.hard-card{border-color:rgba(239,68,68,.4)}
.thm-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#64748B;margin-bottom:.4rem}
.thm-name{font-family:Georgia,serif;font-size:18px;color:#F1F5F9;margin-bottom:.55rem;line-height:1.3}
.thm-stmt{font-size:13px;color:#94A3B8;line-height:1.85}
.hint-btn{background:none;border:none;font-size:12px;font-weight:600;color:#64748B;cursor:pointer;text-decoration:underline;padding:0;margin-bottom:.65rem;display:block}
.hint-box{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:8px;padding:.55rem .85rem;font-size:13px;color:#FCD34D;margin-bottom:.75rem;line-height:1.6;display:none}
.hint-box.on{display:block}
.instr{font-size:13px;font-weight:600;color:#94A3B8;margin-bottom:.7rem}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:.75rem}
.opt{background:#1E293B;border:1.5px solid #334155;border-radius:12px;padding:.85rem .95rem;text-align:left;cursor:pointer;font-size:13px;color:#F1F5F9;line-height:1.75;display:flex;align-items:flex-start;gap:10px;width:100%;transition:border-color .12s,background .12s}
.opt:active:not([disabled]){transform:scale(.99)}
.opt[disabled]{cursor:default}
.opt.sel{border-color:rgba(96,165,250,.5);background:rgba(96,165,250,.12)}
.opt.wrong{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.12)}
.opt.dim{opacity:.28}
.opt.c0{border-color:rgba(107,159,228,.5);background:rgba(107,159,228,.15)}
.opt.c1{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.13)}
.opt.c2{border-color:rgba(52,211,153,.5);background:rgba(52,211,153,.13)}
.badge{flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1.5px solid #475569;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#64748B;font-family:monospace;margin-top:2px;transition:background .12s,border-color .12s,color .12s}
.opt.sel .badge{background:#60A5FA;border-color:#60A5FA;color:#fff}
.opt.wrong .badge{background:#EF4444;border-color:#EF4444;color:#fff}
.opt.c0 .badge{background:#6B9FE4;border-color:#6B9FE4;color:#fff}
.opt.c1 .badge{background:#F59E0B;border-color:#F59E0B;color:#fff}
.opt.c2 .badge{background:#34D399;border-color:#34D399;color:#fff}
.opt-body{flex:1}
.why-txt{display:none;font-size:12px;margin-top:.45rem;padding-top:.45rem;border-top:1px solid;line-height:1.6;font-style:italic}
.opt.c0 .why-txt{display:block;color:#BAD4F8;border-color:rgba(107,159,228,.3)}
.opt.c1 .why-txt{display:block;color:#FCD34D;border-color:rgba(245,158,11,.3)}
.opt.c2 .why-txt{display:block;color:#6EE7B7;border-color:rgba(52,211,153,.3)}
.why-txt a.wlink,.exp-why a.wlink,.fb-body a.wlink{color:inherit;border-bottom:1px dotted currentColor;cursor:pointer;text-decoration:none;font-style:normal;opacity:.9}
.drag-handle{color:#475569;font-size:18px;cursor:grab;flex-shrink:0;margin-top:1px;user-select:none}
.order-num{flex-shrink:0;width:26px;height:26px;border-radius:7px;background:#273449;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#64748B;font-family:monospace;margin-top:2px;transition:background .2s,color .2s}
.opt.dragging{opacity:.4}
.opt.drag-over{border-color:rgba(96,165,250,.5);background:rgba(96,165,250,.12)}
.check-btn{width:100%;padding:.85rem;border-radius:99px;border:1.5px solid #475569;background:#1E293B;color:#F1F5F9;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.exp-panel{background:#1E293B;border:1px solid #334155;border-radius:14px;padding:1rem 1.1rem;margin-bottom:.75rem;display:none}
.exp-panel.on{display:block}
.exp-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#64748B;margin-bottom:.75rem}
.exp-step{display:flex;gap:10px;margin-bottom:.6rem;align-items:flex-start}
.exp-step:last-child{margin-bottom:0}
.exp-num{flex-shrink:0;width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;margin-top:1px;font-family:monospace}
.exp-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.exp-why{font-size:13px;color:#94A3B8;line-height:1.6}
.fb{border-radius:10px;padding:.8rem 1rem;margin-bottom:.75rem;border:1px solid transparent;display:none}
.fb.ok{display:block;background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.5)}
.fb.bad{display:block;background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.5)}
.fb-title{font-size:14px;font-weight:700;margin-bottom:3px}
.fb.ok .fb-title{color:#6EE7B7}
.fb.bad .fb-title{color:#FCA5A5}
.fb-body{font-size:13px;line-height:1.55;color:#94A3B8}
.go-btn{width:100%;padding:1rem;border-radius:99px;border:none;font-size:16px;font-weight:700;cursor:pointer;display:none;transition:transform .1s;margin-top:4px;margin-bottom:max(env(safe-area-inset-bottom,0px),20px)}
.go-btn:active{transform:scale(.97)}
.go-btn.ok{display:block;background:linear-gradient(135deg,#10B981,#059669);color:#fff;box-shadow:0 6px 20px rgba(16,185,129,.3)}
.go-btn.bad{display:block;background:linear-gradient(135deg,#EF4444,#DC2626);color:#fff;box-shadow:0 6px 20px rgba(239,68,68,.25)}
#s-result{align-items:center;justify-content:center;padding:2rem 1.5rem;padding-top:max(env(safe-area-inset-top,0px),2rem);padding-bottom:max(env(safe-area-inset-bottom,0px),2rem);background:radial-gradient(ellipse at 50% 10%,#1E3A5F 0%,#0F172A 60%);text-align:center}
.res-icon{font-size:68px;display:block;margin-bottom:1rem}
.res-title{font-family:Georgia,serif;font-size:28px;font-weight:700;margin-bottom:.4rem}
.res-sub{font-size:14px;color:#94A3B8;margin-bottom:1.75rem;line-height:1.65;max-width:280px}
.res-stats{display:flex;gap:10px;margin-bottom:1.75rem;width:100%;max-width:320px}
.res-stat{flex:1;background:#1E293B;border:1px solid #334155;border-radius:12px;padding:.85rem .5rem;text-align:center}
.res-stat-v{font-size:26px;font-weight:700;display:block;color:#6B9FE4}
.res-stat-l{font-size:10px;color:#64748B;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.res-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.res-btn-p{padding:1rem;border-radius:99px;border:none;background:linear-gradient(135deg,#6B9FE4,#3B82F6);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(107,159,228,.3);transition:transform .1s}
.res-btn-p:active{transform:scale(.97)}
.res-btn-s{padding:1rem;border-radius:99px;border:1.5px solid #334155;background:#1E293B;color:#94A3B8;font-size:15px;font-weight:600;cursor:pointer;transition:transform .1s}
.res-btn-s:active{transform:scale(.97)}
#s-wiki{padding-top:max(env(safe-area-inset-top,0px),0px)}
.wiki-hdr{display:flex;align-items:center;gap:10px;padding:1rem 1rem .75rem;flex-shrink:0;background:#0F172A;position:sticky;top:0;z-index:10}
.wiki-title{font-family:Georgia,serif;font-size:18px;font-weight:700;color:#F1F5F9;flex:1}
.wiki-search{flex:1;background:#1E293B;border:1px solid #334155;border-radius:8px;padding:.5rem .85rem;color:#F1F5F9;font-size:14px;font-family:inherit;outline:none}
.wiki-search::placeholder{color:#475569}
.wiki-search:focus{border-color:#6B9FE4}
.wiki-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 1rem 2rem}
.wiki-body::-webkit-scrollbar{display:none}
.cat-section{margin-bottom:1.25rem}
.cat-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#64748B;margin-bottom:.5rem;padding-top:.5rem}
.wiki-card{background:#1E293B;border:1px solid #334155;border-radius:12px;padding:.75rem 1rem;margin-bottom:6px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .12s,background .12s}
.wiki-card:hover{border-color:#475569;background:#273449}
.wiki-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.wiki-card-info{flex:1;min-width:0}
.wiki-card-title{font-size:14px;font-weight:600;color:#F1F5F9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wiki-card-sym{font-size:11px;color:#64748B;font-family:Georgia,serif;margin-top:1px}
.wiki-card-arrow{color:#475569;font-size:14px}
#s-wiki-detail{padding-top:max(env(safe-area-inset-top,0px),0px)}
.wd-hdr{display:flex;align-items:center;gap:10px;padding:1rem 1rem .75rem;flex-shrink:0;background:#0F172A;position:sticky;top:0;z-index:10;border-bottom:1px solid #1E293B}
.wd-back{background:none;border:none;color:#6B9FE4;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;padding:0;display:flex;align-items:center;gap:4px;flex-shrink:0}
.wd-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem 1rem 3rem}
.wd-body::-webkit-scrollbar{display:none}
.wd-cat-badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.04em;margin-bottom:.75rem}
.wd-title{font-family:Georgia,serif;font-size:22px;font-weight:700;color:#F1F5F9;margin-bottom:.2rem;line-height:1.25}
.wd-symbol{font-family:Georgia,serif;font-size:15px;color:#94A3B8;margin-bottom:1rem}
.wd-content{font-size:14px;color:#CBD5E1;line-height:1.95;margin-bottom:1.25rem}
.wd-content strong{color:#F1F5F9}
.wd-content em{color:#94A3B8;font-style:italic}
.wd-content a.wlink{color:#6B9FE4;text-decoration:none;border-bottom:1px dotted rgba(107,159,228,.5);cursor:pointer;font-style:normal}
.wd-content a.wlink:hover{border-bottom-style:solid}
.wd-section-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#475569;margin-bottom:.5rem}
.wd-links{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
.wd-link{background:#0F172A;border:1px solid #334155;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;color:#6B9FE4;cursor:pointer;transition:border-color .12s,background .12s;font-family:inherit}
.wd-link:hover{border-color:#6B9FE4;background:#1E293B}
.wd-link.green{color:#34D399;border-color:#1E3B2F}
.wd-divider{height:1px;background:#1E293B;margin:1rem 0}
.sync-row{display:flex;align-items:center;gap:8px;width:100%;max-width:340px;margin-top:.6rem}
.sync-status{flex:1;font-size:11px;color:#475569;text-align:left}
.sync-status.ok{color:#34D399}
.sync-status.err{color:#EF4444}
.sync-status.loading{color:#6B9FE4}
.sync-input{flex:1;background:#1E293B;border:1px solid #334155;border-radius:8px;padding:6px 10px;color:#F1F5F9;font-size:12px;font-family:inherit;outline:none;min-width:0}
.sync-input::placeholder{color:#475569}
.sync-input:focus{border-color:#6B9FE4}
.sync-btn{background:none;border:1px solid #334155;border-radius:8px;padding:5px 12px;font-size:11px;font-weight:600;color:#94A3B8;cursor:pointer;white-space:nowrap;transition:border-color .12s,color .12s;flex-shrink:0}
.sync-btn:hover{border-color:#6B9FE4;color:#6B9FE4}
.mastery-panel{width:100%;max-width:340px;margin-top:.85rem;background:#1E293B;border:1px solid #334155;border-radius:14px;padding:.85rem 1rem}
.mastery-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.mastery-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#64748B}
.mastery-btn{background:none;border:none;font-size:11px;color:#6B9FE4;cursor:pointer;padding:0;font-family:inherit}
.mastery-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.mastery-name{font-size:11px;color:#94A3B8;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.mastery-bar-bg{width:80px;height:6px;background:#0F172A;border-radius:99px;overflow:hidden;flex-shrink:0}
.mastery-bar-fill{height:100%;border-radius:99px;transition:width .4s}
.mastery-pct{font-size:10px;font-weight:700;width:28px;text-align:right;flex-shrink:0}
.mastery-legend{display:flex;gap:10px;margin-top:.6rem;flex-wrap:wrap}
.mastery-leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#475569}
.mastery-leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mastery-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1E293B;border:1px solid #334155;border-radius:10px;padding:6px 14px;font-size:12px;font-weight:600;color:#F1F5F9;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.mastery-toast.show{opacity:1}
/* True/False */
.tf-stmt-card{background:#1E293B;border:1.5px solid #334155;border-radius:14px;padding:1rem 1.25rem;margin-bottom:.75rem}
.tf-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#64748B;margin-bottom:.3rem}
.tf-text{font-size:14px;color:#F1F5F9;line-height:1.7}
.tf-btn-row{display:flex;gap:10px;margin-bottom:.5rem}
.tf-btn{flex:1;padding:.75rem;border-radius:10px;border:1.5px solid #334155;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .12s;background:#1E293B;color:#94A3B8}
.tf-btn.true-btn:hover{border-color:#34D399;color:#34D399;background:rgba(52,211,153,.1)}
.tf-btn.false-btn:hover{border-color:#EF4444;color:#EF4444;background:rgba(239,68,68,.1)}
.tf-btn.correct{border-color:#34D399;background:rgba(52,211,153,.15);color:#34D399}
.tf-btn.wrong{border-color:#EF4444;background:rgba(239,68,68,.15);color:#FCA5A5}
.tf-btn.dim{opacity:.3;cursor:default}
.tf-explanation{font-size:12.5px;color:#94A3B8;line-height:1.65;margin-top:.5rem;padding:.6rem .85rem;background:#0F172A;border-radius:8px;border-left:3px solid #334155;display:none}
.tf-explanation.show{display:block}
.tf-explanation.show.ok{border-color:#34D399}
.tf-explanation.show.bad{border-color:#EF4444}
.tf-progress{font-size:11px;color:#475569;margin-bottom:.5rem;font-weight:600}
.tf-score{font-size:13px;font-weight:700;margin-top:.5rem}
.solution-btn{width:100%;padding:.7rem;border-radius:99px;border:1.5px solid #4F7DBF;background:rgba(79,125,191,.12);color:#6B9FE4;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;margin-bottom:6px;transition:all .12s;font-family:inherit}
.solution-btn:hover{background:rgba(79,125,191,.22);border-color:#6B9FE4}
.solution-btn:active{transform:scale(.98)}
.pick-pool{display:flex;flex-direction:column;gap:6px;margin-bottom:.75rem}
.pick-pool-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#64748B;margin-bottom:2px}
.pick-slot-area{min-height:44px;background:#0F172A;border:1.5px dashed #334155;border-radius:10px;padding:6px;display:flex;flex-direction:column;gap:5px;margin-bottom:.75rem;transition:border-color .15s}
.pick-slot-area.has-items{border-color:#475569}
.pick-option{background:#1E293B;border:1.5px solid #334155;border-radius:10px;padding:.65rem .9rem;font-size:13px;color:#F1F5F9;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .12s;line-height:1.5;text-align:left;width:100%;font-family:inherit}
.pick-option:active{transform:scale(.98)}
.pick-option.chosen{border-color:rgba(107,159,228,.5);background:rgba(107,159,228,.12);opacity:.55;cursor:default}
.pick-option.disabled{cursor:default}

<script>

const firebaseConfig={apiKey:"AIzaSyCE9o42ZekICLHHwFS7v6Uee7e2Xmfmtsw",authDomain:"theorem-test.firebaseapp.com",projectId:"theorem-test",storageBucket:"theorem-test.firebasestorage.app",messagingSenderId:"65472887776",appId:"1:65472887776:web:3f4286da6e752731a10985",measurementId:"G-T0DLWT33MV"};
let db=null,currentUsername=null,syncEnabled=false;
function setSyncStatus(msg,cls){const el=document.getElementById('sync-status');if(!el)return;el.textContent=msg;el.className='sync-status'+(cls?' '+cls:'');}
function sanitiseUsername(raw){return raw.trim().toLowerCase().replace(/[^a-z0-9_]/g,'').slice(0,30);}
function showLoginRow(){const lr=document.getElementById('sync-row-login'),sr=document.getElementById('sync-row-status');if(lr)lr.style.display='flex';if(sr)sr.style.display='none';}
function showStatusRow(){const lr=document.getElementById('sync-row-login'),sr=document.getElementById('sync-row-status');if(lr)lr.style.display='none';if(sr)sr.style.display='flex';}
async function pushData(){if(!db||!currentUsername||!syncEnabled)return;try{const p=+localStorage.getItem('mas_p')||0,b=+localStorage.getItem('mas_b')||0,c=+localStorage.getItem('mas_c')||0,t=+localStorage.getItem('mas_t')||0;let qd={};try{const raw=localStorage.getItem('mas_qdata');if(raw)qd=JSON.parse(raw);}catch(e){}await db.collection('users').doc(currentUsername).set({p,b,c,t,qdata:qd,updated:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}catch(e){console.warn('Push failed:',e);}}
async function connectUser(username){if(!db)return;currentUsername=username;syncEnabled=true;localStorage.setItem('mas_username',username);showStatusRow();setSyncStatus('\u2601 Syncing\u2026','loading');try{const snap=await db.collection('users').doc(username).get();if(snap.exists){const d=snap.data();const lp=+localStorage.getItem('mas_p')||0,lb=+localStorage.getItem('mas_b')||0,lc=+localStorage.getItem('mas_c')||0,lt=+localStorage.getItem('mas_t')||0;localStorage.setItem('mas_p',Math.max(lp,d.p||0));localStorage.setItem('mas_b',Math.max(lb,d.b||0));localStorage.setItem('mas_c',Math.max(lc,d.c||0));localStorage.setItem('mas_t',Math.max(lt,d.t||0));if(d.qdata){let localQD={};try{const raw=localStorage.getItem('mas_qdata');if(raw)localQD=JSON.parse(raw);}catch(e){}
// Merge: remote wins on seen count (take max); for new-format fields prefer whichever has more history
const merged={};
const allKeys=new Set([...Object.keys(d.qdata),...Object.keys(localQD)]);
allKeys.forEach(k=>{
  const rem=d.qdata[k]||{};const loc=localQD[k]||{};
  // Keep whichever has higher seen count as base, then take max seen
  const base=(rem.seen||0)>=(loc.seen||0)?{...rem}:{...loc};
  base.seen=Math.max(rem.seen||0,loc.seen||0);
  // If either side is old format (has 'correct' field), migration will happen in getQEntry
  // If both are new format, prefer the one with more history entries
  if((rem.history||[]).length>(loc.history||[]).length)base.history=rem.history;
  else if((loc.history||[]).length>(rem.history||[]).length)base.history=loc.history;
  // Take higher consecutiveCorrect and higher bag (more progress)
  // bag/consecutiveCorrect removed — history and seen are the only data
  merged[k]=base;
});
localStorage.setItem('mas_qdata',JSON.stringify(merged));if(typeof loadQData==='function')loadQData();}setSyncStatus('\u2601 Synced \u00b7 @'+username,'ok');
// Push immediately to overwrite any old-format Firestore data with new format
await pushData();}else{setSyncStatus('\u2601 New user \u00b7 @'+username,'ok');await pushData();}if(typeof loadStats==='function')loadStats();}catch(e){console.warn('Sync failed:',e);setSyncStatus('\u2601 Sync error \u2014 working offline','err');}}
function initFirebase(){try{if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);db=firebase.firestore();const saved=localStorage.getItem('mas_username');if(saved){connectUser(saved);}else{showLoginRow();}}catch(e){console.warn('Firebase init failed:',e);showLoginRow();}}

window.syncLogout=function(){currentUsername=null;syncEnabled=false;localStorage.removeItem('mas_username');showLoginRow();const input=document.getElementById('sync-username-input');if(input){input.value='';input.focus();}};
window.firebasePush=async function(){if(!syncEnabled)return;await pushData();setSyncStatus('\u2601 Synced \u00b7 @'+currentUsername,'ok');};
window.confirmReset=function(){if(confirm('Reset all stats and learning progress? This cannot be undone.')){localStorage.setItem('mas_p',0);localStorage.setItem('mas_b',0);localStorage.setItem('mas_c',0);localStorage.setItem('mas_t',0);localStorage.removeItem('mas_qdata');if(typeof loadQData==='function'){window.qData={};loadQData();}if(typeof loadStats==='function')loadStats();if(typeof window.firebasePush==='function')window.firebasePush();}};
initFirebase();


window.syncLogin=async function(){const input=document.getElementById('sync-username-input');if(!input||!db)return;const username=sanitiseUsername(input.value);if(username.length<3){input.style.borderColor='#EF4444';input.placeholder='Min 3 chars';setTimeout(()=>{input.style.borderColor='';input.placeholder='Enter a username to sync…';},2500);return;}input.value='';await connectUser(username);};

window.firebasePush=pushData;
initFirebase();

const Q=[

// ---- LIMITS & CONTINUITY ----
{cat:'Limits & Continuity',type:'mc',
 text:'What is the formal ε-δ definition for lim_{x→a} f(x) = L for a scalar field f:ℝⁿ→ℝ?',
 opts:['∀ε>0, ∃δ>0 such that 0<‖x−a‖<δ ⟹ |f(x)−L|<ε',
       '∀δ>0, ∃ε>0 such that |f(x)−L|<ε ⟹ ‖x−a‖<δ',
       '∀ε>0, ∃δ>0 such that ‖x−a‖<δ ⟹ |f(x)−L|<ε (including x=a)',
       '∀ε>0, ∃δ>0 such that |f(x)−L|<δ ⟹ ‖x−a‖<ε'],
 ans:0,
 why:'The ε-δ definition for scalar fields uses the Euclidean norm ‖x−a‖ for the input distance, and |f(x)−L| for the output distance. The condition 0<‖x−a‖<δ excludes x=a itself.',
 hint:'Remember: x is in ℝⁿ so we use the Euclidean norm ‖x−a‖ = √((x₁−a₁)²+...+(xₙ−aₙ)²) for the input distance.'},

{cat:'Limits & Continuity',type:'mc',
 text:'Consider f(x,y) = 4xy/(3x²+y²) for (x,y)≠(0,0), and f(0,0)=0. What happens along y=x?',

       'f(x,x) → 1/2, revealing a jump discontinuity',
       'The limit along y=x does not exist'],
 ans:0,
 why:'Along y=x: f(x,x)=4x²/(3x²+x²)=4x²/4x²=1 for all x>0. Since f(0,0)=0 but the limit along this path is 1≠0, the function is discontinuous at the origin.',
 hint:'Substitute y=x directly into f(x,y) and simplify. Compare the result to f(0,0)=0.'},

{cat:'Limits & Continuity',type:'mc',
 text:'To show lim_{(x,y)→(0,0)} x²/√(x²+y²) = 0, which argument is used?',
 opts:['Squeeze: 0 ≤ x²/√(x²+y²) ≤ √(x²+y²) → 0',
       'Direct substitution: x=0,y=0 gives 0/0 which equals 0',
       'Polar coordinates: set x=r, y=0 and let r→0',
       'The function is bounded by 1, so the limit is 0'],
 ans:0,
 why:'Since x²≤x²+y², we have x²/√(x²+y²) ≤ (x²+y²)/√(x²+y²) = √(x²+y²) → 0. Also x²/√(x²+y²) ≥ 0. The squeeze gives the limit.',
 hint:'Find upper and lower bounds for the expression that both tend to 0 as (x,y)→(0,0).'},

{cat:'Limits & Continuity',type:'mc',
 text:'Which statement correctly characterises continuity of f:ℝ²→ℝ at (a,b)?',

       'f(x,y) → f(a,b) as x→a with y fixed'],
 ans:0,
 why:'Continuity requires the full 2D limit (from ALL directions) to equal the function value. Existence of partial derivatives is neither necessary nor sufficient for continuity.',
 hint:'Think about what "the limit from all directions" means — it must equal the function value at the point.'},

{cat:'Limits & Continuity',type:'mc',
 text:'The function g(x,y)=4x⁴y/(3x⁸+y²) has g(0,0)=0. Is g continuous at the origin?',
 opts:['No — along y=x⁴ the function approaches 1, not 0',
       'Yes — the squeeze theorem shows |g(x,y)|≤√(x²+y²)→0',
       'No — ∂g/∂x does not exist at the origin',

 ans:0,
 why:'Along y=x⁴: g(x,x⁴)=4x⁸/(3x⁸+x⁸)=4x⁸/4x⁸=1 for x≠0. So the limit along this curved path is 1≠0=g(0,0). Note: g→0 along all STRAIGHT lines, but the path y=x⁴ reveals the discontinuity.',
 hint:'Try the path y=x⁴ (a curved path). What does g become along this curve?'},

{cat:'Limits & Continuity',type:'tf',
 text:'f:ℝ²→ℝ is continuous at (a,b)',
 statements:[
  {s:'If the limit of f along every straight line through (a,b) equals f(a,b), then f is continuous at (a,b).',ans:false,

  {s:'If f has continuous partial derivatives ∂f/∂x and ∂f/∂y at (a,b), then f is continuous at (a,b).',ans:true,
   why:'TRUE. Continuous partial derivatives imply differentiability, which implies continuity.'},
  {s:'A differentiable function f:ℝ²→ℝ is necessarily continuous.',ans:true,

{cat:'Critical Points & Taylor',type:'mc',
 text:'For f(x,y)=x³+y³−3xy at the critical point (1,1), the Hessian is H=[[6,−3],[−3,6]]. Classify this point.',

       'Degenerate (λ=0)'],

 hint:'Check: if det(H)>0 and ∂²f/∂x²>0, the point is a local minimum. If det(H)>0 and ∂²f/∂x²<0, local maximum. If det(H)<0, saddle.'},

{cat:'Lagrange Multipliers',type:'tf',
 text:'Lagrange multiplier theory',
 statements:[
  {s:'At a constrained maximum of f subject to g=c, we must have ∇f=λ∇g for some λ∈ℝ.',ans:true,
   why:'TRUE. This is the Lagrange condition — the gradient of f must be parallel to the gradient of g at a constrained extremum (assuming ∇g≠0).'},
  {s:'The value of the Lagrange multiplier λ has no physical meaning.',ans:false,
   why:'FALSE. λ has a concrete interpretation: it equals ∂f/∂c, the rate of change of the optimal value of f as the constraint c changes.'},
  {s:'If f and g have continuous partial derivatives and ∇g≠0 at the solution, the method is guaranteed to find all local extrema on g=c.',ans:true,
   why:'TRUE. Every local extremum of f on the constraint surface g=c must satisfy ∇f=λ∇g (when ∇g≠0). So solving the Lagrange system finds all candidates.'},
  {s:'For two constraints g₁=c₁ and g₂=c₂, the Lagrangian is L=f−λg₁−μg₂ (omitting the constants c₁, c₂ since ∂L/∂λ=0 recovers g₁=c₁).',ans:true,
   why:'TRUE. Writing L=f−λ(g₁−c₁)−μ(g₂−c₂) or equivalently L=f−λg₁−μg₂ (plus constants that vanish on differentiation) are equivalent.'},
 ]},

let activeCat=null;
function selCat(cat){
  activeCat=cat;
  document.querySelectorAll('.mode-pill').forEach(p=>p.classList.remove('on'));
  const pillMap={null:'pill-all','Limits & Continuity':'pill-lim','Partial Derivatives':'pill-par',
    'Gradient & Differentiability':'pill-grd','Chain Rule':'pill-chn',
    'Critical Points & Taylor':'pill-crt','Multiple Integrals':'pill-int',
    'Change of Variables':'pill-chv','Lagrange Multipliers':'pill-lag'};
  const id=pillMap[cat];
  if(id)document.getElementById(id).classList.add('on');

  const pool=cat?Q.filter(q=>q.cat===cat):Q;
  note.textContent='10 questions · '+pool.length+' available · '+(cat||'All Topics');
}

// ================================================================
// SELECTION (weighted by recency & accuracy)
// ================================================================
function qWeight(q){
  const e=getE(q);
  if(e.seen===0)return 200;
  const acc=e.history.length?e.history.filter(Boolean).length/e.history.length:0.5;
  let w=Math.exp(-4*acc);
  const age=Date.now()-(e.lastSeen||0);
  if(age>900000)w*=Math.min(8,1+Math.log2(age/900000));
  return w;
}

function selectQuestions(n){
  const pool=(activeCat?Q.filter(q=>q.cat===activeCat):[...Q]).map(q=>({q,w:qWeight(q)}));
  const selected=[],avail=[...pool];
  for(let i=0;i<Math.min(n,avail.length);i++){
    const tot=avail.reduce((s,x)=>s+x.w,0);if(tot<=0)break;
    let r=Math.random()*tot;
    for(let j=0;j<avail.length;j++){r-=avail[j].w;if(r<=0){selected.push(avail[j].q);avail.splice(j,1);break;}}
  }
  return selected;
}

// ================================================================
// MASTERY PANEL
// ================================================================
function catScore(cat){
  const catQs=Q.filter(q=>q.cat===cat);
  const seen=catQs.filter(q=>getE(q).seen>0);
  if(!seen.length)return{score:0,seen:0,total:catQs.length};
  const avg=seen.reduce((s,q)=>{const e=getE(q);return s+(e.history.length?e.history.filter(Boolean).length/e.history.length:0);},0)/seen.length;
  return{score:Math.round(avg*100*seen.length/catQs.length),seen:seen.length,total:catQs.length};
}
function catColor(s){return s>=90?'#34D399':s>=70?'#60A5FA':s>=50?'#F59E0B':s>0?'#EF4444':'#475569';}
function renderMastery(){
  const panel=document.getElementById('mastery-panel'),list=document.getElementById('mastery-list');
  if(!panel||!list)return;
  const anySeen=Q.some(q=>getE(q).seen>0);
  panel.style.display=anySeen?'block':'none';
  if(!anySeen)return;
  list.innerHTML='';
  CAT_LIST.forEach(cat=>{
    const {score,seen,total}=catScore(cat);
    const col=catColor(score);
    const row=document.createElement('div');row.className='mastery-cat-row';
    row.innerHTML=`<div class="mastery-cat-name" style="color:${CAT_COLORS[cat]||'#94A3B8'}">${cat}</div><div class="mastery-cat-bar-bg"><div class="mastery-cat-bar-fill" style="width:${score}%;background:${col}"></div></div><div class="mastery-cat-pct" style="color:${col}">${seen===0?'—':score+'%'}</div>`;
    list.appendChild(row);
  });
}

function startQuiz(){
  qs=selectQuestions(10);qi=0;cor=0;tot=0;stk=0;
  show('s-quiz');renderQ();

function renderQ(){
  done=false;
  const q=qs[qi];
  document.getElementById('prog').style.width=(qi/qs.length*100)+'%';
  document.getElementById('stk').textContent=stk;
  const body=document.getElementById('q-body');
  body.innerHTML='';

  // Header: category + question number
  const num=document.createElement('div');num.className='thm-lbl';num.style.marginTop='8px';
  num.textContent='Q'+(qi+1)+' of '+qs.length+' · '+q.cat;body.appendChild(num);

  if(q.type==='mc')renderMC(q,body);
  else if(q.type==='tf')renderTF(q,body);
  else if(q.type==='gap')renderGap(q,body);
}

// ---- MULTI-CHOICE ----
function renderMC(q,body){
  const card=document.createElement('div');card.className='thm-card';
  card.innerHTML=`<div class="thm-name" style="font-size:15px;font-family:inherit">${q.text}</div>`;
  if(q.hint){const hb=document.createElement('div');hb.className='hint-box on';hb.style.display='block';hb.textContent='💡 '+q.hint;card.appendChild(hb);}
  body.appendChild(card);

  const fb=document.createElement('div');fb.className='fb';fb.id='q-fb';
  const go=document.createElement('button');go.className='go-btn';go.id='q-go';go.onclick=advance;go.style.display='none';

  const lets=['A','B','C','D'];
  const optDiv=document.createElement('div');optDiv.className='opts';
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');btn.className='opt';
    btn.innerHTML=`<span class="badge">${lets[i]}</span><span class="opt-body">${opt}</span>`;
    btn.onclick=()=>pickMC(i,q,btn,optDiv,fb,go);
    optDiv.appendChild(btn);
  });
  body.appendChild(optDiv);body.appendChild(fb);body.appendChild(go);
}

function pickMC(i,q,btn,optDiv,fb,go){
  if(done)return;done=true;
  const ok=i===q.ans;
  recordAnswer(q,ok);
  optDiv.querySelectorAll('.opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.ans)b.className='opt c0';
    else if(b===btn&&!ok)b.className='opt wrong';
    else b.className='opt dim';
  });
  fb.className='fb '+(ok?'ok':'bad');
  fb.innerHTML=`<div class="fb-title">${ok?'✓ Correct!':'✗ Incorrect'}</div><div class="fb-body">${q.why||''}</div>`;
  go.style.display='block';go.className='go-btn '+(ok?'ok':'bad');
  go.textContent=qi+1<qs.length?'Next →':'See results →';
}

function renderTFStmt(q,body){

  const s=q.statements[tfIdx];
  const prog=document.createElement('div');prog.className='tf-progress';prog.textContent='Statement '+(tfIdx+1)+' of '+q.statements.length;body.appendChild(prog);
  const card=document.createElement('div');card.className='tf-stmt-card';
  card.innerHTML=`<div class="tf-label">Statement ${tfIdx+1}</div><div class="tf-text">${s.s}</div>`;body.appendChild(card);
  const btnRow=document.createElement('div');btnRow.className='tf-btn-row';
  const tBtn=document.createElement('button');tBtn.className='tf-btn true-btn';tBtn.textContent='✓ True';
  const fBtn=document.createElement('button');fBtn.className='tf-btn false-btn';fBtn.textContent='✗ False';
  tBtn.onclick=()=>answerTF(true,q,body,tBtn,fBtn,s);
  fBtn.onclick=()=>answerTF(false,q,body,tBtn,fBtn,s);
  btnRow.appendChild(tBtn);btnRow.appendChild(fBtn);body.appendChild(btnRow);
}

function answerTF(ans,q,body,tBtn,fBtn,s){
  tBtn.disabled=true;fBtn.disabled=true;
  const ok=ans===s.ans;
  if(ok)tfCor++;
  tBtn.className='tf-btn true-btn '+(s.ans===true?(ok?'correct':'dim'):'dim');
  fBtn.className='tf-btn false-btn '+(s.ans===false?(ok?'correct':'dim'):'dim');
  const exp=document.createElement('div');
  exp.className='tf-explanation show '+(ok?'ok':'bad');
  exp.textContent=(ok?'✓ ':'✗ ')+(s.ans?'TRUE':'FALSE')+' — '+s.why;
  body.appendChild(exp);
  tfIdx++;
  if(tfIdx<q.statements.length){
    const nb=document.createElement('button');nb.className='go-btn '+(ok?'ok':'bad');
    nb.style.display='block';nb.textContent='Next statement →';
    nb.onclick=()=>{nb.remove();body.querySelectorAll('.tf-progress,.tf-stmt-card,.tf-btn-row,.tf-explanation').forEach(e=>e.remove());renderTFStmt(q,body);};
    body.appendChild(nb);
  }else{
    const allOk=tfCor===q.statements.length;
    recordAnswer(q,allOk);
    const go=document.createElement('button');go.className='go-btn '+(allOk?'ok':'bad');
    go.style.display='block';go.id='q-go';
    go.textContent=qi+1<qs.length?'Next →':'See results →';go.onclick=advance;body.appendChild(go);
  }
}

// ---- GAP FILL ----
function renderGap(q,body){
  const card=document.createElement('div');card.className='thm-card';
  card.innerHTML=`<div class="thm-name" style="font-size:14px;font-family:inherit">${q.text}</div><div class="thm-stmt">Fill in the blanks:</div>`;
  body.appendChild(card);
  gapOk=true;gapChecked=0;gapTotal=q.steps.reduce((s,st)=>s+(st.answer2!==undefined?2:1),0);
  const go=document.createElement('button');go.className='go-btn';go.id='q-go';go.style.display='none';go.onclick=advance;
  q.steps.forEach((step,i)=>{renderGapStep(step,i,q,body,go);});
  body.appendChild(go);
}

function normGap(s){return String(s).toLowerCase().replace(/\s+/g,'').replace(/[−–]/g,'-');}

function renderGapStep(step,i,q,body,go){
  const row=document.createElement('div');row.style.marginBottom='12px';
  // Context text
  const has2=step.answer2!==undefined;
  const ctx=document.createElement('div');ctx.className='gap-stmt';
  ctx.style.cssText='background:#1E293B;border:1px solid #334155;border-radius:12px;padding:.85rem 1rem;margin-bottom:8px;font-size:13px;color:#94A3B8;line-height:2';
  const mk=(id)=>`<span id="gd-${i}-${id}" style="display:inline-block;background:rgba(107,159,228,.12);border:1.5px solid #6B9FE4;border-radius:6px;padding:2px 12px;color:#6B9FE4;font-weight:700;min-width:60px;text-align:center;vertical-align:middle">?</span>`;
  ctx.innerHTML=(step.before||'')+mk(0)+(step.after||'')+(has2?mk(1)+(step.after2||''):'');
  row.appendChild(ctx);
  // Input 1
  const w1=document.createElement('div');w1.style.cssText='display:flex;gap:8px;align-items:center;margin-bottom:6px';
  const inp1=document.createElement('input');inp1.className='epn-input';inp1.id='gi-'+i+'-0';inp1.placeholder='Answer…';inp1.autocomplete='off';inp1.autocorrect='off';inp1.autocapitalize='off';inp1.spellcheck=false;
  const chk1=document.createElement('button');chk1.className='epn-check-btn';chk1.textContent='Check';
  chk1.onclick=()=>checkGap(i,0,step.answer,inp1,chk1,q,go,body);
  inp1.addEventListener('keydown',e=>{if(e.key==='Enter')chk1.click();});
  w1.appendChild(inp1);w1.appendChild(chk1);row.appendChild(w1);
  const rev1=document.createElement('div');rev1.id='gr-'+i+'-0';rev1.style.cssText='font-size:12px;color:#34D399;margin-bottom:4px;display:none';rev1.textContent='✓ Answer: '+step.answer;row.appendChild(rev1);
  if(has2){
    const w2=document.createElement('div');w2.style.cssText='display:flex;gap:8px;align-items:center;margin-bottom:6px';
    const inp2=document.createElement('input');inp2.className='epn-input';inp2.id='gi-'+i+'-1';inp2.placeholder='Second blank…';inp2.autocomplete='off';inp2.autocorrect='off';inp2.autocapitalize='off';inp2.spellcheck=false;inp2.disabled=true;
    const chk2=document.createElement('button');chk2.className='epn-check-btn';chk2.textContent='Check';chk2.disabled=true;
    chk2.onclick=()=>checkGap(i,1,step.answer2,inp2,chk2,q,go,body);
    inp2.addEventListener('keydown',e=>{if(e.key==='Enter')chk2.click();});
    w2.appendChild(inp2);w2.appendChild(chk2);row.appendChild(w2);
    const rev2=document.createElement('div');rev2.id='gr-'+i+'-1';rev2.style.cssText='font-size:12px;color:#34D399;margin-bottom:4px;display:none';rev2.textContent='✓ Answer: '+step.answer2;row.appendChild(rev2);
    inp1._next=()=>{inp2.disabled=false;chk2.disabled=false;};
  }
  const why=document.createElement('div');why.id='gw-'+i;why.style.cssText='font-size:12px;color:#64748B;font-style:italic;margin-top:4px;display:none';why.textContent=step.why||'';row.appendChild(why);
  body.insertBefore(row,go);
}

function checkGap(stepI,blankI,answer,inp,btn,q,go,body){
  btn.disabled=true;inp.disabled=true;
  const ok=normGap(inp.value)===normGap(answer);
  inp.className='epn-input '+(ok?'correct':'wrong');
  btn.textContent=ok?'✓':'✗';
  const disp=document.getElementById('gd-'+stepI+'-'+blankI);
  if(disp){disp.textContent=answer;disp.style.background=ok?'rgba(52,211,153,.12)':'rgba(239,68,68,.08)';disp.style.borderColor=ok?'#34D399':'#EF4444';disp.style.color=ok?'#34D399':'#FCA5A5';}
  if(!ok){gapOk=false;const rev=document.getElementById('gr-'+stepI+'-'+blankI);if(rev)rev.style.display='block';}
  if(inp._next)inp._next();
  const why=document.getElementById('gw-'+stepI);if(why)why.style.display='block';
  gapChecked++;
  if(gapChecked>=gapTotal){
    recordAnswer(q,gapOk);
    go.style.display='block';go.className='go-btn '+(gapOk?'ok':'bad');
    go.textContent=qi+1<qs.length?'Next →':'See results →';
  }
}

// ================================================================
// SCORING
// ================================================================
function recordAnswer(q,ok){
  tot++;if(ok){cor++;stk++;}else{stk=0;}
  document.getElementById('stk').textContent=stk;
  const e=getE(q);e.seen++;e.lastSeen=Date.now();e.history.push(ok);if(e.history.length>10)e.history.shift();if(ok)e.correct=(e.correct||0)+1;
  saveQData();
}

function advance(){
  qi++;
  if(qi>=qs.length){
    const pct=Math.round(cor/tot*100);
    document.getElementById('r-icon').textContent=pct===100?'🏆':pct>=70?'🎉':pct>=50?'📚':'💪';
    document.getElementById('r-title').textContent=pct===100?'Perfect!':pct>=70?'Well done!':pct>=50?'Good effort!':'Keep at it!';
    document.getElementById('r-sub').textContent=cor+' of '+tot+' correct · Best streak '+stk;
    document.getElementById('r-sc').textContent=cor+'/'+tot;
    document.getElementById('r-sa').textContent=pct+'%';
    saveStats();show('s-result');return;
  }
  renderQ();
}

// ================================================================
// FIREBASE PUSH
// ================================================================
async function pushData(){
  if(!db||!currentUsername||!syncEnabled)return;
  try{
    const p=+localStorage.getItem('msp_p')||0,c=+localStorage.getItem('msp_c')||0,t=+localStorage.getItem('msp_t')||0;
    await db.collection('users_msp').doc(currentUsername).set({p,c,t,qdata:qData,updated:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
  }catch(e){console.warn('Push failed:',e);}
}

async function connectUser(username){
  if(!db)return;currentUsername=username;syncEnabled=true;localStorage.setItem('msp_username',username);
  showStatusRow();setSyncStatus('☁ Syncing…','loading');
  try{
    const snap=await db.collection('users_msp').doc(username).get();
    if(snap.exists){
      const d=snap.data();
      localStorage.setItem('msp_p',Math.max(+localStorage.getItem('msp_p')||0,d.p||0));
      localStorage.setItem('msp_c',Math.max(+localStorage.getItem('msp_c')||0,d.c||0));
      localStorage.setItem('msp_t',Math.max(+localStorage.getItem('msp_t')||0,d.t||0));
      if(d.qdata){const merged={...d.qdata,...qData};localStorage.setItem('msp_qdata',JSON.stringify(merged));loadQData();}
      setSyncStatus('☁ Synced · @'+username,'ok');
      await pushData();
    }else{setSyncStatus('☁ New user · @'+username,'ok');await pushData();}
    loadStats();
  }catch(e){console.warn('Sync failed:',e);setSyncStatus('☁ Offline','err');}
}

function initFirebase(){
  try{
    if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
    db=firebase.firestore();
    const saved=localStorage.getItem('msp_username');
    if(saved)connectUser(saved);else showLoginRow();
  }catch(e){console.warn('Firebase init failed:',e);showLoginRow();}
}

// ================================================================
// INIT
// ================================================================
loadQData();
loadStats();
initFirebase();
</script>
